<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>観測域 - 離席中</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;background:#000800;overflow:hidden;font-family:Consolas, "Courier New", monospace;color:#44ff88;}

/* .obs- プレフィックス付き固有クラス群(waitingとは骨格が異なる: 左寄せ端末停止画面) */
.obs-halt-frame{position:absolute;inset:0;width:1920px;height:1080px;z-index:10;display:flex;align-items:center;padding-left:140px;}
.obs-halt-panel{width:1180px;border-left:2px solid rgba(68,255,136,0.4);padding-left:48px;}
.obs-halt-label{font-size:12px;letter-spacing:8px;color:rgba(68,255,136,0.55);margin-bottom:26px;text-transform:uppercase;}
.obs-halt-line{font-size:15px;letter-spacing:1px;color:rgba(68,255,136,0.35);padding:4px 0;text-decoration:line-through;text-decoration-color:rgba(68,255,136,0.15);}
.obs-halt-current{font-size:26px;letter-spacing:2px;color:rgba(68,255,136,0.85);margin:22px 0;min-height:34px;}
.obs-halt-cursor{display:inline-block;width:16px;height:30px;background:#44ff88;margin-left:8px;vertical-align:-6px;animation:obsHaltBlink 1s step-end infinite;box-shadow:0 0 14px #44ff88;}
@keyframes obsHaltBlink{0%,100%{opacity:1}50%{opacity:0}}
.obs-halt-footer{margin-top:36px;font-size:11px;letter-spacing:5px;color:rgba(68,255,136,0.35);}
canvas{position:absolute;top:0;left:0;width:1920px;height:1080px;z-index:1;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="obs-halt-frame">
  <div class="obs-halt-panel">
    <div class="obs-halt-label">LOG HALTED</div>
    <div id="obs-history"></div>
    <div class="obs-halt-current">記録は継続されています<span class="obs-halt-cursor"></span></div>
    <div class="obs-halt-footer">対象の観測は継続されています</div>
  </div>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=1920;canvas.height=1080;
let t=0;
function draw(){
  ctx.clearRect(0,0,1920,1080);
  ctx.strokeStyle='rgba(68,255,136,0.04)';
  for(let x=0;x<1920;x+=90){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,1080);ctx.stroke();}
  t+=0.003;
  requestAnimationFrame(draw);
}
draw();

const LINES=["記録は継続されています", "対象を再捕捉中", "ログを保存しています", "観測は止まっていません"];
const historyEl=document.getElementById('obs-history');
for(let i=0;i<3;i++){
  const d=document.createElement('div');
  d.className='obs-halt-line';
  d.textContent=LINES[i%LINES.length];
  historyEl.appendChild(d);
}
setInterval(()=>{
  if(Math.random()<0.4){
    const d=document.createElement('div');
    d.className='obs-halt-line';
    d.textContent=LINES[Math.floor(Math.random()*LINES.length)];
    historyEl.appendChild(d);
    if(historyEl.children.length>4) historyEl.removeChild(historyEl.firstChild);
  }
},4200);
</script>
</body>
</html>
