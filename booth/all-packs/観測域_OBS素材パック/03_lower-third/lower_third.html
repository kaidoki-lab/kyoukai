<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>観測域 - ローワーサード</title>
<!--
  OBS設定: ブラウザソース → このHTMLを指定 → 幅1920 高さ1080
  名前変更: ?name=&title= のURLパラメータで指定してください
-->
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;background:transparent;overflow:hidden;font-family:Consolas, "Courier New", monospace;}

/* .obs- プレフィックス付き固有クラス群(端末プロンプト風) */
.obs-prompt{position:absolute;bottom:80px;left:80px;display:flex;align-items:baseline;gap:14px;padding:14px 22px;background:rgba(0,10,4,0.5);border:1px solid rgba(68,255,136,0.35);animation:obsPromptIn .6s ease both;}
@keyframes obsPromptIn{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
.obs-prompt-chevron{font-size:30px;color:#44ff88;text-shadow:0 0 10px #44ff88;}
.obs-prompt-name{font-size:30px;letter-spacing:3px;color:rgba(255,255,255,0.94);}
.obs-prompt-cursor{display:inline-block;width:14px;height:26px;background:#44ff88;margin-left:4px;vertical-align:-4px;animation:obsPCursor 1s step-end infinite;}
@keyframes obsPCursor{0%,100%{opacity:1}50%{opacity:0}}
.obs-prompt-sub{position:absolute;left:80px;bottom:52px;font-size:11px;letter-spacing:4px;color:rgba(68,255,136,0.55);}
</style>
</head>
<body>
<div class="obs-prompt">
  <span class="obs-prompt-chevron">&gt;</span>
  <span class="obs-prompt-name" id="name-el">名前</span>
  <span class="obs-prompt-cursor"></span>
</div>
<div class="obs-prompt-sub" id="title-el">KYOUKAI</div>
<script>
const p=new URLSearchParams(window.location.search);
document.getElementById('name-el').textContent=p.get('name')||'名前';
document.getElementById('title-el').textContent=p.get('title')||'KYOUKAI';
</script>
</body>
</html>
