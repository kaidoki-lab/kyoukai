<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>悪魔の間 - 離席中</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;background:#040000;overflow:hidden;font-family:'Courier New',monospace;color:#cc1122;}

/* .ma- プレフィックス付き固有クラス群(waitingとは骨格が異なる: 光の呼吸+間欠セリフのみの中央構図) */
.ma-brb-stage{position:absolute;inset:0;width:1920px;height:1080px;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ma-brb-glow{position:absolute;left:50%;top:50%;width:900px;height:900px;margin:-450px 0 0 -450px;border-radius:50%;background:radial-gradient(circle,rgba(204,17,34,0.42) 0%,rgba(204,17,34,0.1) 50%,rgba(0,0,0,0) 75%);animation:maBrbBreathe 6.4s ease-in-out infinite;}
@keyframes maBrbBreathe{0%,100%{transform:scale(0.8);opacity:0.5}50%{transform:scale(1.18);opacity:1}}
.ma-brb-msg{position:relative;z-index:10;font-size:30px;letter-spacing:4px;color:#cc1122;text-shadow:0 0 24px rgba(204,17,34,0.7);min-height:44px;text-align:center;}
.ma-brb-sub{position:relative;z-index:10;font-size:12px;letter-spacing:6px;color:rgba(204,17,34,0.4);margin-top:24px;}
canvas{position:absolute;top:0;left:0;width:1920px;height:1080px;z-index:1;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ma-brb-stage">
  <div class="ma-brb-glow"></div>
  <div class="ma-brb-msg" id="ma-brb-msg">大魔将は沈黙しています</div>
  <div class="ma-brb-sub">存在はここにある</div>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=1920;canvas.height=1080;
let t=0;
function draw(){
  ctx.clearRect(0,0,1920,1080);
  const breathe=(Math.sin(t)+1)/2;
  ctx.fillStyle='rgba(204,17,34,'+(0.015+breathe*0.03)+')';
  ctx.fillRect(0,0,1920,1080);
  t+=0.01;
  requestAnimationFrame(draw);
}
draw();

const LINES=["……帰れ。", "長居はするな。", "……少しだけ、暇だった。", "闇とはな、恐ろしいものではない。", "ただ、静かなのだ。", "待っていたわけでは、ない。", "……ゆっくりしていけ。", "貴様は物好きだな。"];
const msgEl=document.getElementById('ma-brb-msg');
setInterval(()=>{
  msgEl.style.opacity='0';
  setTimeout(()=>{
    msgEl.textContent=LINES[Math.floor(Math.random()*LINES.length)];
    msgEl.style.opacity='1';
  },600);
},5500);
msgEl.style.transition='opacity 0.6s ease';
</script>
</body>
</html>
