<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>悪魔の間 - 待機画面</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;background:#040000;overflow:hidden;font-family:'Courier New',monospace;color:#cc1122;}

/* .ma- プレフィックス付き固有クラス群(計器なし・呼吸する光のみ) */
.ma-void{position:absolute;inset:0;width:1920px;height:1080px;z-index:5;}
.ma-glow-core{position:absolute;left:50%;top:50%;width:640px;height:640px;margin:-320px 0 0 -320px;border-radius:50%;background:radial-gradient(circle,rgba(204,17,34,0.5) 0%,rgba(204,17,34,0.14) 45%,rgba(0,0,0,0) 72%);animation:maBreathe 5.2s ease-in-out infinite;}
@keyframes maBreathe{0%,100%{transform:scale(0.85);opacity:0.55}50%{transform:scale(1.12);opacity:0.95}}
.ma-sigil{position:absolute;left:50%;top:50%;width:360px;height:360px;margin:-180px 0 0 -180px;border:1px solid rgba(204,17,34,0.35);border-radius:50%;animation:maSigilSpin 40s linear infinite;}
.ma-sigil::before,.ma-sigil::after{content:'';position:absolute;inset:34px;border:1px solid rgba(204,17,34,0.22);border-radius:50%;}
.ma-sigil::after{inset:70px;border-color:rgba(204,17,34,0.15);}
@keyframes maSigilSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.ma-label{position:absolute;top:70px;left:0;width:100%;text-align:center;font-size:13px;letter-spacing:10px;color:rgba(204,17,34,0.55);text-transform:uppercase;}
.ma-silence-line{position:absolute;bottom:110px;left:0;width:100%;text-align:center;font-size:20px;letter-spacing:3px;color:rgba(204,17,34,0.35);transition:color 2s ease;}
canvas{position:absolute;top:0;left:0;width:1920px;height:1080px;z-index:1;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ma-label">PRESENCE CHECK</div>
<div class="ma-void">
  <div class="ma-glow-core"></div>
  <div class="ma-sigil"></div>
</div>
<div class="ma-silence-line" id="ma-silence"></div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=1920;canvas.height=1080;
let t=0;
function draw(){
  ctx.clearRect(0,0,1920,1080);
  const breathe=(Math.sin(t)+1)/2;
  ctx.fillStyle='rgba(204,17,34,'+(0.02+breathe*0.02)+')';
  ctx.fillRect(0,0,1920,1080);
  t+=0.012;
  requestAnimationFrame(draw);
}
draw();

// 台詞は「大魔将」の沈黙がちな口調を踏襲し、長い無言のあとに短く現れる
const LINES=["……帰れ。", "長居はするな。", "……少しだけ、暇だった。", "闇とはな、恐ろしいものではない。", "ただ、静かなのだ。", "待っていたわけでは、ない。", "……ゆっくりしていけ。", "貴様は物好きだな。"];
const silenceEl=document.getElementById('ma-silence');
function showSilenceLine(){
  silenceEl.textContent=LINES[Math.floor(Math.random()*LINES.length)];
  silenceEl.style.color='rgba(204,17,34,0.5)';
  setTimeout(()=>{silenceEl.style.color='rgba(204,17,34,0)';},2600);
}
setInterval(showSilenceLine,7000);
</script>
</body>
</html>
