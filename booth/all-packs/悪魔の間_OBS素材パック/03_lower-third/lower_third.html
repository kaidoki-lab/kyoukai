<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>悪魔の間 - ローワーサード</title>
<!--
  OBS設定: ブラウザソース → このHTMLを指定 → 幅1920 高さ1080
  名前変更: ?name=&title= のURLパラメータで指定してください
-->
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;background:transparent;overflow:hidden;font-family:'Courier New',monospace;}

/* .ma- プレフィックス付き固有クラス群(紋様付き黒枠+刻印風の名前) */
.ma-lt-frame{position:absolute;bottom:80px;left:80px;padding:20px 34px;background:rgba(4,0,0,0.72);border:1px solid rgba(204,17,34,0.5);box-shadow:inset 0 0 0 1px rgba(204,17,34,0.15),0 0 20px rgba(204,17,34,0.25);}
.ma-lt-frame::before{content:'';position:absolute;inset:6px;border:1px dashed rgba(204,17,34,0.25);pointer-events:none;}
.ma-lt-name{position:relative;font-size:32px;letter-spacing:4px;color:#cc1122;text-shadow:0 0 2px #000,0 0 14px rgba(204,17,34,0.6);}
.ma-lt-title{position:absolute;left:80px;bottom:54px;font-size:11px;letter-spacing:5px;color:rgba(204,17,34,0.55);}
</style>
</head>
<body>
<div class="ma-lt-frame">
  <span class="ma-lt-name" id="name-el">名前</span>
</div>
<div class="ma-lt-title" id="title-el">KYOUKAI</div>
<script>
const p=new URLSearchParams(window.location.search);
document.getElementById('name-el').textContent=p.get('name')||'名前';
document.getElementById('title-el').textContent=p.get('title')||'KYOUKAI';
</script>
</body>
</html>
