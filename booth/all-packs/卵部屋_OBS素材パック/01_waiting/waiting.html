<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>卵部屋 - 待機画面</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;background:#050003;overflow:hidden;font-family:'Courier New',monospace;color:#ffaacc;}

/* .fks- プレフィックス付き固有クラス群(孵化装置ビュー: 中央画像+卵形粒子明滅+左右計器パネル) */
.fks-bg{position:absolute;top:0;left:0;width:1920px;height:1080px;background-color:#050003;background-image:url('assets/fukashitsu-room-9x16.png');background-repeat:no-repeat;background-position:center center;background-size:auto 1080px;z-index:1;}
.fks-bg-fade-left{position:absolute;top:0;left:0;width:30%;height:100%;background:linear-gradient(to right,#050003 0%,rgba(0,0,0,0) 100%);z-index:2;}
.fks-bg-fade-right{position:absolute;top:0;right:0;width:30%;height:100%;background:linear-gradient(to left,#050003 0%,rgba(0,0,0,0) 100%);z-index:2;}
.fks-header{position:absolute;top:44px;left:0;width:100%;text-align:center;font-size:13px;letter-spacing:8px;color:rgba(255,170,204,0.75);z-index:6;}
.fks-egg-canvas{position:absolute;left:50%;top:50%;width:520px;height:640px;margin:-320px 0 0 -260px;z-index:5;}
.fks-panel{position:absolute;top:220px;width:300px;padding:24px;background:rgba(10,0,6,0.5);border:1px solid rgba(255,170,204,0.3);border-radius:16px;z-index:6;}
.fks-panel--left{left:64px;}
.fks-panel--right{right:64px;}
.fks-gauge{margin-bottom:22px;}
.fks-gauge:last-child{margin-bottom:0;}
.fks-gauge-label{font-size:12px;letter-spacing:4px;margin-bottom:8px;opacity:0.8;}
.fks-gauge-bar{width:100%;height:14px;border-radius:7px;background:rgba(255,255,255,0.08);overflow:hidden;}
.fks-gauge-fill{height:100%;border-radius:7px;transition:width 0.6s ease;}
.fks-caption{position:absolute;bottom:56px;left:0;width:100%;text-align:center;font-size:14px;letter-spacing:5px;color:rgba(255,170,204,0.65);z-index:6;}
</style>
</head>
<body>
<div class="fks-bg"></div>
<div class="fks-bg-fade-left"></div>
<div class="fks-bg-fade-right"></div>
<div class="fks-header">KYOUKAI // 卵部屋</div>
<canvas class="fks-egg-canvas" id="fksEgg" width="260" height="320"></canvas>
<div class="fks-panel fks-panel--left">
  <div class="fks-gauge">
    <div class="fks-gauge-label">栄養</div>
    <div class="fks-gauge-bar"><div class="fks-gauge-fill" id="gauge-r" style="background:rgb(255,132,132);width:40%;"></div></div>
  </div>
  <div class="fks-gauge">
    <div class="fks-gauge-label">酸素</div>
    <div class="fks-gauge-bar"><div class="fks-gauge-fill" id="gauge-b" style="background:rgb(132,186,255);width:55%;"></div></div>
  </div>
</div>
<div class="fks-panel fks-panel--right">
  <div class="fks-gauge">
    <div class="fks-gauge-label">温度</div>
    <div class="fks-gauge-bar"><div class="fks-gauge-fill" id="gauge-y" style="background:rgb(255,232,125);width:62%;"></div></div>
  </div>
  <div class="fks-gauge">
    <div class="fks-gauge-label">孵化予測</div>
    <div class="fks-gauge-bar"><div class="fks-gauge-fill" id="gauge-x" style="background:rgba(255,170,204,0.7);width:28%;"></div></div>
  </div>
</div>
<div class="fks-caption">孵化まで観測を継続します</div>
<script>
(function(){
  var cv=document.getElementById('fksEgg');
  var ctx=cv.getContext('2d');
  var W=cv.width,H=cv.height;
  var cx=W*0.5,cy=H*0.5;
  var COLORS={"r": [255, 132, 132], "b": [132, 186, 255], "y": [255, 232, 125]};
  var N=140;
  var pts=[];
  function eggPoint(){
    var a=Math.random()*Math.PI*2;
    var rx=W*0.36,ry=H*0.40;
    // 卵形: 下部を膨らませ上部をすぼめる
    var yShape=Math.sin(a)>=0?ry*1.12:ry*0.86;
    return {
      x:cx+Math.cos(a)*rx*(0.3+Math.random()*0.7),
      y:cy+Math.sin(a)*yShape*(0.3+Math.random()*0.7)
    };
  }
  for(var i=0;i<N;i++){
    var p=eggPoint();
    var f=i/N;
    var t=f<0.34?'r':f<0.67?'b':'y';
    pts.push({x:p.x,y:p.y,t:t,phase:Math.random()*Math.PI*2,sz:1.6+Math.random()*1.8});
  }
  var t=0;
  function draw(){
    t+=0.02;
    ctx.clearRect(0,0,W,H);
    // 卵の輪郭(淡いガイド)
    ctx.strokeStyle='rgba(255,170,204,0.18)';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.ellipse(cx,cy,W*0.36,H*0.40,0,0,Math.PI*2);
    ctx.stroke();
    for(var i=0;i<pts.length;i++){
      var p=pts[i];
      var glow=0.4+0.6*Math.abs(Math.sin(t+p.phase));
      var c=COLORS[p.t];
      ctx.globalAlpha=glow;
      ctx.fillStyle='rgb('+c[0]+','+c[1]+','+c[2]+')';
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
  }
  draw();
})();

// 計器ゲージがゆっくり揺れながら推移する(常時観測中を表現)
function jitterGauge(id,base){
  var el=document.getElementById(id);
  if(!el)return;
  setInterval(function(){
    var v=Math.max(15,Math.min(92,base+(Math.random()-0.5)*10));
    el.style.width=v+'%';
  },2600);
}
jitterGauge('gauge-r',40);
jitterGauge('gauge-b',55);
jitterGauge('gauge-y',62);
jitterGauge('gauge-x',28);
</script>
</body>
</html>
