<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>卵部屋 - ローワーサード</title>
<!--
  OBS設定: ブラウザソース → このHTMLを指定 → 幅1920 高さ1080
  名前変更: ?name=&title= のURLパラメータで指定してください
-->
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;background:transparent;overflow:hidden;font-family:'Courier New',monospace;}

/* .fks- プレフィックス付き固有クラス群(卵形の丸枠テロップ、淡いパステル) */
.fks-lt-egg{position:absolute;bottom:70px;left:80px;padding:22px 46px;border-radius:50% 50% 50% 50% / 65% 65% 35% 35%;background:linear-gradient(180deg,rgba(255,170,204,0.28),rgba(255,170,204,0.08));border:2px solid rgba(255,170,204,0.55);box-shadow:0 0 26px rgba(255,170,204,0.3);display:flex;align-items:center;}
.fks-lt-name{font-size:32px;letter-spacing:3px;color:rgba(255,255,255,0.95);}
.fks-lt-title{position:absolute;left:96px;bottom:44px;font-size:11px;letter-spacing:4px;color:rgba(255,170,204,0.7);}
</style>
</head>
<body>
<div class="fks-lt-egg">
  <span class="fks-lt-name" id="name-el">名前</span>
</div>
<div class="fks-lt-title" id="title-el">KYOUKAI</div>
<script>
const p=new URLSearchParams(window.location.search);
document.getElementById('name-el').textContent=p.get('name')||'名前';
document.getElementById('title-el').textContent=p.get('title')||'KYOUKAI';
</script>
</body>
</html>
