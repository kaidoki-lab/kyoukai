<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>極楽域 - 待機画面</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;background:#040200;overflow:hidden;font-family:'Courier New',monospace;color:#ffaa44;}

/* .gok- プレフィックス付き固有クラス群(引き出し棚のCSS grid構成) */
.gok-label{position:absolute;top:64px;left:0;width:100%;text-align:center;font-size:13px;letter-spacing:9px;color:rgba(255,170,68,0.6);z-index:6;text-transform:uppercase;}
.gok-cabinet{position:absolute;left:50%;top:50%;width:1200px;height:640px;margin:-320px 0 0 -600px;display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(4,1fr);gap:14px;padding:20px;background:linear-gradient(180deg,#1a0f04,#0a0602);border:2px solid rgba(255,170,68,0.4);box-shadow:0 0 60px rgba(255,170,68,0.2) inset;}
.gok-drawer{position:relative;background:linear-gradient(180deg,rgba(255,170,68,0.14),rgba(255,170,68,0.04));border:1px solid rgba(255,170,68,0.45);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:transform 0.4s ease;}
.gok-drawer-spectrum{width:60px;height:18px;}
.gok-drawer-num{font-size:11px;letter-spacing:2px;color:rgba(255,170,68,0.55);}
.gok-fragment-log{position:absolute;bottom:96px;left:0;width:100%;text-align:center;font-size:15px;letter-spacing:4px;color:rgba(255,170,68,0.65);z-index:6;min-height:24px;}
canvas.gok-drawer-spectrum{display:block;}
</style>
</head>
<body>
<div class="gok-label">ARCHIVE CABINET</div>
<div class="gok-cabinet"><div class="gok-drawer" style="grid-row:1;grid-column:1;" data-idx="1"><canvas class="gok-drawer-spectrum" data-slot="1" width="60" height="18"></canvas><span class="gok-drawer-num">01</span></div><div class="gok-drawer" style="grid-row:1;grid-column:2;" data-idx="2"><canvas class="gok-drawer-spectrum" data-slot="2" width="60" height="18"></canvas><span class="gok-drawer-num">02</span></div><div class="gok-drawer" style="grid-row:1;grid-column:3;" data-idx="3"><canvas class="gok-drawer-spectrum" data-slot="3" width="60" height="18"></canvas><span class="gok-drawer-num">03</span></div><div class="gok-drawer" style="grid-row:1;grid-column:4;" data-idx="4"><canvas class="gok-drawer-spectrum" data-slot="4" width="60" height="18"></canvas><span class="gok-drawer-num">04</span></div><div class="gok-drawer" style="grid-row:1;grid-column:5;" data-idx="5"><canvas class="gok-drawer-spectrum" data-slot="5" width="60" height="18"></canvas><span class="gok-drawer-num">05</span></div><div class="gok-drawer" style="grid-row:2;grid-column:1;" data-idx="6"><canvas class="gok-drawer-spectrum" data-slot="6" width="60" height="18"></canvas><span class="gok-drawer-num">06</span></div><div class="gok-drawer" style="grid-row:2;grid-column:2;" data-idx="7"><canvas class="gok-drawer-spectrum" data-slot="7" width="60" height="18"></canvas><span class="gok-drawer-num">07</span></div><div class="gok-drawer" style="grid-row:2;grid-column:3;" data-idx="8"><canvas class="gok-drawer-spectrum" data-slot="8" width="60" height="18"></canvas><span class="gok-drawer-num">08</span></div><div class="gok-drawer" style="grid-row:2;grid-column:4;" data-idx="9"><canvas class="gok-drawer-spectrum" data-slot="9" width="60" height="18"></canvas><span class="gok-drawer-num">09</span></div><div class="gok-drawer" style="grid-row:2;grid-column:5;" data-idx="10"><canvas class="gok-drawer-spectrum" data-slot="10" width="60" height="18"></canvas><span class="gok-drawer-num">10</span></div><div class="gok-drawer" style="grid-row:3;grid-column:1;" data-idx="11"><canvas class="gok-drawer-spectrum" data-slot="11" width="60" height="18"></canvas><span class="gok-drawer-num">11</span></div><div class="gok-drawer" style="grid-row:3;grid-column:2;" data-idx="12"><canvas class="gok-drawer-spectrum" data-slot="12" width="60" height="18"></canvas><span class="gok-drawer-num">12</span></div><div class="gok-drawer" style="grid-row:3;grid-column:3;" data-idx="13"><canvas class="gok-drawer-spectrum" data-slot="13" width="60" height="18"></canvas><span class="gok-drawer-num">13</span></div><div class="gok-drawer" style="grid-row:3;grid-column:4;" data-idx="14"><canvas class="gok-drawer-spectrum" data-slot="14" width="60" height="18"></canvas><span class="gok-drawer-num">14</span></div><div class="gok-drawer" style="grid-row:3;grid-column:5;" data-idx="15"><canvas class="gok-drawer-spectrum" data-slot="15" width="60" height="18"></canvas><span class="gok-drawer-num">15</span></div><div class="gok-drawer" style="grid-row:4;grid-column:1;" data-idx="16"><canvas class="gok-drawer-spectrum" data-slot="16" width="60" height="18"></canvas><span class="gok-drawer-num">16</span></div><div class="gok-drawer" style="grid-row:4;grid-column:2;" data-idx="17"><canvas class="gok-drawer-spectrum" data-slot="17" width="60" height="18"></canvas><span class="gok-drawer-num">17</span></div><div class="gok-drawer" style="grid-row:4;grid-column:3;" data-idx="18"><canvas class="gok-drawer-spectrum" data-slot="18" width="60" height="18"></canvas><span class="gok-drawer-num">18</span></div><div class="gok-drawer" style="grid-row:4;grid-column:4;" data-idx="19"><canvas class="gok-drawer-spectrum" data-slot="19" width="60" height="18"></canvas><span class="gok-drawer-num">19</span></div><div class="gok-drawer" style="grid-row:4;grid-column:5;" data-idx="20"><canvas class="gok-drawer-spectrum" data-slot="20" width="60" height="18"></canvas><span class="gok-drawer-num">20</span></div></div>
<div class="gok-fragment-log" id="gok-log">引き出し 1</div>
<script>
const FRAGMENTS=["引き出し 1", "── 開かない", "音響装置 起動", "記憶の収納", "奥へ続く", "扉 発見", "鍵 必要", "音が聞こえる", "── 何の音か", "極楽 ではない"];
const logEl=document.getElementById('gok-log');
function nextFragment(){
  logEl.style.opacity='0';
  setTimeout(()=>{
    logEl.textContent=FRAGMENTS[Math.floor(Math.random()*FRAGMENTS.length)];
    logEl.style.opacity='1';
  },300);
}
logEl.style.transition='opacity 0.3s ease';
setInterval(nextFragment,2800);

// 各引き出しのスペクトルバー(棚に埋め込み)
const bars=document.querySelectorAll('.gok-drawer-spectrum');
const ctxs=Array.from(bars).map(c=>c.getContext('2d'));
const heights=Array.from(bars).map(()=>Array.from({length:10},()=>Math.random()));
function drawSpectrum(){
  ctxs.forEach((ctx,i)=>{
    ctx.clearRect(0,0,60,18);
    const h=heights[i];
    for(let b=0;b<h.length;b++){
      h[b]+=(Math.random()-0.5)*0.35;
      h[b]=Math.max(0.05,Math.min(1,h[b]));
      const barH=h[b]*16;
      ctx.fillStyle='rgba(255,170,68,'+(0.35+h[b]*0.5)+')';
      ctx.fillRect(b*6,18-barH,4,barH);
    }
  });
  requestAnimationFrame(drawSpectrum);
}
drawSpectrum();
</script>
</body>
</html>
