<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>極楽域 - 離席中</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;background:#040200;overflow:hidden;font-family:'Courier New',monospace;color:#ffaa44;}

/* .gok- プレフィックス付き固有クラス群(waitingとは骨格が異なる: 引き出しが1つずつ開閉するシーケンス構図) */
.gok-brb-stage{position:absolute;inset:0;width:1920px;height:1080px;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.gok-brb-row{display:flex;gap:24px;}
.gok-brb-drawer{width:140px;height:100px;background:linear-gradient(180deg,rgba(255,170,68,0.18),rgba(255,170,68,0.05));border:1px solid rgba(255,170,68,0.5);transform-origin:top center;animation:gokDrawerOpen 3.5s ease-in-out infinite;}
@keyframes gokDrawerOpen{0%,100%{transform:translateY(0);}30%{transform:translateY(36px);}60%{transform:translateY(36px);}}
.gok-brb-num{margin-top:56px;font-size:24px;letter-spacing:6px;color:#ffaa44;text-shadow:0 0 16px rgba(255,170,68,0.5);}
.gok-brb-msg{margin-top:24px;font-size:20px;letter-spacing:4px;color:#ffaa44;text-shadow:0 0 14px rgba(255,170,68,0.5);min-height:32px;opacity:0.85;}
canvas{position:absolute;top:0;left:0;width:1920px;height:1080px;z-index:1;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="gok-brb-stage">
  <div class="gok-brb-row"><div class="gok-brb-drawer" style="animation-delay:0.0s;"></div><div class="gok-brb-drawer" style="animation-delay:0.35s;"></div><div class="gok-brb-drawer" style="animation-delay:0.7s;"></div><div class="gok-brb-drawer" style="animation-delay:1.0499999999999998s;"></div><div class="gok-brb-drawer" style="animation-delay:1.4s;"></div></div>
  <div class="gok-brb-num" id="gok-num">音源番号 01</div>
  <div class="gok-brb-msg" id="gok-msg"></div>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=1920;canvas.height=1080;
function draw(){
  ctx.clearRect(0,0,1920,1080);
  ctx.fillStyle='rgba(255,170,68,0.02)';
  ctx.fillRect(0,0,1920,1080);
  requestAnimationFrame(draw);
}
draw();

const numEl=document.getElementById('gok-num');
function cycleNum(){
  const n=1+Math.floor(Math.random()*24);
  numEl.textContent='音源番号 '+String(n).padStart(2,'0');
}
setInterval(cycleNum,3500);

const LINES=["音源を調整しています", "引き出しを整理中", "奥への経路を確認中", "音響装置を再起動中", "記憶を参照しています"];
const msgEl=document.getElementById('gok-msg');
function showLine(){
  msgEl.textContent=LINES[Math.floor(Math.random()*LINES.length)];
  msgEl.style.opacity='1';
  setTimeout(()=>{msgEl.style.opacity='0';},2200);
}
msgEl.style.transition='opacity 0.5s ease';
setInterval(showLine,4000);
</script>
</body>
</html>
