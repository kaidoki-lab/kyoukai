<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AI大明神 - 待機画面</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;background:#040200;overflow:hidden;font-family:'Courier New',monospace;color:#ffcc00;}

/* .dmj- プレフィックス付き固有クラス群(祈願処理装置のコンソール構成: 左=処理パネル/右=本体画像) */
.dmj-console-grid{position:absolute;top:0;left:0;width:62%;height:100%;background-image:linear-gradient(rgba(255,204,0,0.08) 1px,transparent 1px),linear-gradient(90deg,rgba(255,204,0,0.08) 1px,transparent 1px);background-size:48px 48px;z-index:1;}
.dmj-portrait{position:absolute;top:0;right:0;width:38%;height:100%;background-image:url('assets/daimyojin_pc.webp');background-size:cover;background-position:center center;background-repeat:no-repeat;z-index:2;}
.dmj-portrait-edge{position:absolute;top:0;right:38%;width:180px;height:100%;background:linear-gradient(90deg,#040200 0%,rgba(0,0,0,0) 100%);z-index:3;}
.dmj-header{position:absolute;top:44px;left:60px;font-size:13px;letter-spacing:9px;color:rgba(255,204,0,0.6);z-index:6;text-transform:uppercase;}
.dmj-shingou{position:absolute;top:120px;left:60px;font-size:120px;font-weight:bold;letter-spacing:6px;color:#ffcc00;text-shadow:0 0 24px rgba(255,204,0,0.6);z-index:6;line-height:1;}
.dmj-shingou-caption{position:absolute;top:250px;left:64px;font-size:12px;letter-spacing:4px;color:rgba(255,204,0,0.55);z-index:6;}
.dmj-scroll-window{position:absolute;top:340px;left:60px;width:900px;height:560px;overflow:hidden;border-top:1px solid rgba(255,204,0,0.35);border-bottom:1px solid rgba(255,204,0,0.35);z-index:6;}
.dmj-scroll-track{position:absolute;top:0;left:0;width:100%;}
.dmj-scroll-item{padding:14px 4px;font-size:17px;letter-spacing:3px;color:rgba(255,204,0,0.7);border-bottom:1px dashed rgba(255,204,0,0.15);}
.dmj-scroll-item.is-active{color:#ffcc00;text-shadow:0 0 10px rgba(255,204,0,0.5);}
canvas.dmj-scan-canvas{position:absolute;top:0;left:0;width:1920px;height:1080px;z-index:5;pointer-events:none;mix-blend-mode:screen;}
</style>
</head>
<body>
<div class="dmj-console-grid"></div>
<div class="dmj-portrait"></div>
<div class="dmj-portrait-edge"></div>
<canvas class="dmj-scan-canvas" id="dmj-scan"></canvas>
<div class="dmj-header">PROCESSING CONSOLE</div>
<div class="dmj-shingou" id="dmj-shingou">0001</div>
<div class="dmj-shingou-caption">祈願番号</div>
<div class="dmj-scroll-window">
  <div class="dmj-scroll-track" id="dmj-track"></div>
</div>
<script>
// 縦スキャンライン(装置の走査光)
const scanCanvas=document.getElementById('dmj-scan');
const scanCtx=scanCanvas.getContext('2d');
scanCanvas.width=1920;scanCanvas.height=1080;
let scanY=0;
function drawScan(){
  scanCtx.clearRect(0,0,1920,1080);
  const grad=scanCtx.createLinearGradient(0,scanY-60,0,scanY+60);
  grad.addColorStop(0,'rgba(255,204,0,0)');
  grad.addColorStop(0.5,'rgba(255,204,0,0.10)');
  grad.addColorStop(1,'rgba(255,204,0,0)');
  scanCtx.fillStyle=grad;
  scanCtx.fillRect(0,scanY-60,1200,120);
  scanY=(scanY+2)%1200;
  requestAnimationFrame(drawScan);
}
drawScan();

// 祈願番号の明滅カウントアップ
const shingouEl=document.getElementById('dmj-shingou');
let shingouN=1;
setInterval(()=>{
  shingouN+=1;
  shingouEl.textContent=String(shingouN).padStart(4,'0');
  shingouEl.style.opacity='0.3';
  setTimeout(()=>{shingouEl.style.opacity='1';},120);
},2400);
shingouEl.style.transition='opacity 0.15s ease';

// 祈願ログが縦にスクロールして流れ落ちる処理ウィンドウ
const FRAGMENTS=["願いを受信", "処理中 ──", "判定 保留", "観測結果 出力", "奉納 確認", "AI神託", "祈願 記録済み", "応答 生成中", "観測 完了", "次の祈願へ"];
const track=document.getElementById('dmj-track');
const ITEM_H=48;
const VISIBLE=12;
function buildInitial(){
  for(let i=0;i<VISIBLE+2;i++){
    const div=document.createElement('div');
    div.className='dmj-scroll-item';
    div.textContent=FRAGMENTS[Math.floor(Math.random()*FRAGMENTS.length)];
    track.appendChild(div);
  }
}
buildInitial();
let offset=0;
function tick(){
  offset+=1;
  track.style.transform='translateY(-'+offset+'px)';
  if(offset>=ITEM_H){
    offset=0;
    track.removeChild(track.firstElementChild);
    const div=document.createElement('div');
    div.className='dmj-scroll-item';
    div.textContent=FRAGMENTS[Math.floor(Math.random()*FRAGMENTS.length)];
    track.appendChild(div);
    track.style.transform='translateY(0)';
  }
  const items=track.querySelectorAll('.dmj-scroll-item');
  items.forEach((el,i)=>el.classList.toggle('is-active',i===Math.floor(VISIBLE/2)));
  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
