<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AI大明神 - 離席中</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;background:#040200;overflow:hidden;font-family:'Courier New',monospace;color:#ffcc00;}

/* .dmj- プレフィックス付き固有クラス群(waitingとも異なる構図: 円環プログレスリングが回転する処理待機画面) */
.dmj-brb-stage{position:absolute;inset:0;width:1920px;height:1080px;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.dmj-ring-wrap{position:relative;width:420px;height:420px;}
.dmj-ring{position:absolute;inset:0;border-radius:50%;border:6px solid transparent;border-top-color:rgba(255,204,0,0.85);border-right-color:rgba(255,204,0,0.35);animation:dmjRingSpin 2.2s linear infinite;}
.dmj-ring--inner{inset:60px;border-width:3px;border-top-color:rgba(255,204,0,0.5);border-left-color:rgba(255,204,0,0.2);animation-duration:3.4s;animation-direction:reverse;}
@keyframes dmjRingSpin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.dmj-ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:34px;letter-spacing:5px;color:#ffcc00;text-shadow:0 0 18px rgba(255,204,0,0.6);}
.dmj-brb-caption{margin-top:48px;font-size:16px;letter-spacing:8px;color:rgba(255,204,0,0.6);text-transform:uppercase;}
.dmj-brb-msg{margin-top:20px;font-size:22px;letter-spacing:4px;color:#ffcc00;text-shadow:0 0 14px rgba(255,204,0,0.5);min-height:32px;opacity:0.85;}
canvas{position:absolute;top:0;left:0;width:1920px;height:1080px;z-index:1;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="dmj-brb-stage">
  <div class="dmj-ring-wrap">
    <div class="dmj-ring"></div>
    <div class="dmj-ring dmj-ring--inner"></div>
    <div class="dmj-ring-center">祈願</div>
  </div>
  <div class="dmj-brb-caption">PROCESSING</div>
  <div class="dmj-brb-msg" id="dmj-msg"></div>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=1920;canvas.height=1080;
function draw(){
  ctx.clearRect(0,0,1920,1080);
  ctx.fillStyle='rgba(255,204,0,0.02)';
  ctx.fillRect(0,0,1920,1080);
  requestAnimationFrame(draw);
}
draw();

const LINES=["祈願を処理しています", "AI神託を生成中", "奉納データを参照中", "願いを観測しています", "処理が完了していません"];
const msgEl=document.getElementById('dmj-msg');
function showLine(){
  msgEl.textContent=LINES[Math.floor(Math.random()*LINES.length)];
  msgEl.style.opacity='1';
  setTimeout(()=>{msgEl.style.opacity='0';},2200);
}
msgEl.style.transition='opacity 0.5s ease';
setInterval(showLine,3800);
</script>
</body>
</html>
