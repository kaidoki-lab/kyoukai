<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>評議録 - 離席中</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;overflow:hidden;font-family:'MS Mincho', 'Yu Mincho', 'Courier New', monospace;color:#ccbb99;
  background:radial-gradient(circle at 50% 44%,rgba(255,220,160,0.06),transparent 40%),#080600;}

/* .hyo- プレフィックス付き固有クラス群(白紙の議事用紙に時折「──」だけが打たれる。waitingとは全く異なる単一用紙構成) */
.hyo-paper{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:640px;height:880px;background:linear-gradient(180deg,rgba(30,26,18,0.5),rgba(10,8,4,0.7));border:1px solid rgba(204,187,153,0.22);box-shadow:0 0 60px rgba(0,0,0,0.6),inset 0 0 60px rgba(0,0,0,0.4);z-index:5;}
.hyo-paper-mark{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);writing-mode:vertical-rl;font-size:46px;letter-spacing:24px;color:rgba(204,187,153,0.55);opacity:0;animation:hyoMark 4s ease-in-out infinite;}
@keyframes hyoMark{0%,60%{opacity:0}68%,88%{opacity:0.8}100%{opacity:0}}
.hyo-paper-label{position:absolute;top:32px;left:0;right:0;text-align:center;font-size:11px;letter-spacing:8px;color:rgba(204,187,153,0.55);text-transform:uppercase;}
.hyo-footer{position:absolute;bottom:56px;left:0;right:0;text-align:center;font-size:11px;letter-spacing:6px;color:rgba(204,187,153,0.35);z-index:6;}
canvas{position:absolute;top:0;left:0;width:1920px;height:1080px;z-index:0;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hyo-paper">
  <div class="hyo-paper-label">議事 一時中断</div>
  <div class="hyo-paper-mark">── ──</div>
</div>
<div class="hyo-footer">記録は継続されています</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=1920;canvas.height=1080;
function draw(){
  ctx.fillStyle='rgba(204,187,153,0.006)';
  ctx.fillRect(0,0,1920,1080);
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
