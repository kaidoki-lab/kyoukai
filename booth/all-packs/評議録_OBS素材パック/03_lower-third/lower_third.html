<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>評議録 - ローワーサード</title>
<!--
  OBS設定: ブラウザソース → このHTMLを指定 → 幅1920 高さ1080
  名前変更: ?name=&title= のURLパラメータで指定してください
-->
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;background:transparent;overflow:hidden;font-family:'MS Mincho', 'Yu Mincho', 'Courier New', monospace;}

/* .hyo- プレフィックス付き固有クラス群(毛筆風の縦線+発言者札) */
.hyo-fuda{position:absolute;bottom:70px;left:80px;display:flex;align-items:flex-end;gap:20px;animation:hyoFudaIn .7s ease both;}
@keyframes hyoFudaIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.hyo-brush-line{width:4px;height:150px;background:linear-gradient(to bottom,transparent,#ccbb99 20%,#ccbb99 80%,transparent);}
.hyo-fuda-plate{writing-mode:vertical-rl;background:linear-gradient(160deg,rgba(28,22,14,0.92),rgba(10,8,4,0.88));border:1px solid rgba(204,187,153,0.4);padding:20px 14px;box-shadow:0 10px 24px rgba(0,0,0,0.5);}
.hyo-fuda-name{font-size:30px;letter-spacing:6px;color:rgba(255,246,224,0.94);}
.hyo-fuda-title{margin-top:14px;font-size:12px;letter-spacing:4px;color:rgba(204,187,153,0.6);}
</style>
</head>
<body>
<div class="hyo-fuda">
  <div class="hyo-brush-line"></div>
  <div class="hyo-fuda-plate">
    <span class="hyo-fuda-name" id="name-el">名前</span>
    <span class="hyo-fuda-title" id="title-el">LIVE</span>
  </div>
</div>
<script>
const p=new URLSearchParams(window.location.search);
document.getElementById('name-el').textContent=p.get('name')||'名前';
document.getElementById('title-el').textContent=p.get('title')||'LIVE';
</script>
</body>
</html>
