<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>管理人室 - 待機画面</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;background:#050300;overflow:hidden;font-family:'Courier New',monospace;color:#aa8855;}
canvas{position:absolute;top:0;left:0;width:1920px;height:1080px;}
.scanlines{position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.12) 3px,rgba(0,0,0,0.12) 4px);pointer-events:none;z-index:20;}
.ui{position:absolute;top:0;left:0;width:1920px;height:1080px;z-index:10;}
.corner{position:absolute;width:36px;height:36px;}
.corner--tl{top:48px;left:48px;border-top:1px solid #aa8855;border-left:1px solid #aa8855;opacity:.5;}
.corner--tr{top:48px;right:48px;border-top:1px solid #aa8855;border-right:1px solid #aa8855;opacity:.5;}
.corner--bl{bottom:48px;left:48px;border-bottom:1px solid #aa8855;border-left:1px solid #aa8855;opacity:.5;}
.corner--br{bottom:48px;right:48px;border-bottom:1px solid #aa8855;border-right:1px solid #aa8855;opacity:.5;}
.top-bar{position:absolute;top:54px;left:0;right:0;text-align:center;font-size:11px;letter-spacing:8px;color:rgba(170,136,85,0.35);text-transform:uppercase;}
.rec{position:absolute;top:50px;right:100px;display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:4px;color:rgba(170,136,85,0.5);}
.rec-dot{width:7px;height:7px;border-radius:50%;background:#aa8855;box-shadow:0 0 6px #aa8855;animation:blink 1.4s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}
.freq-block{position:absolute;left:100px;top:50%;transform:translateY(-50%);}
.label{font-size:10px;letter-spacing:4px;color:rgba(170,136,85,0.3);margin-bottom:6px;}
.freq-value{font-size:38px;letter-spacing:3px;color:rgba(170,136,85,0.75);text-shadow:0 0 20px rgba(170,136,85,0.3);}
.unit{font-size:10px;letter-spacing:4px;color:rgba(170,136,85,0.2);margin-top:4px;}
.source-block{position:absolute;right:100px;top:50%;transform:translateY(-50%);text-align:right;}
.source-value{font-size:16px;letter-spacing:4px;color:rgba(170,136,85,0.45);margin-top:6px;}
.frags{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;}
.frag{position:absolute;font-size:10px;letter-spacing:2px;color:rgba(170,136,85,0.18);white-space:nowrap;}
@keyframes fragFade{0%,100%{opacity:0}15%,85%{opacity:1}}
.bottom-bar{position:absolute;bottom:56px;left:100px;right:100px;display:flex;justify-content:space-between;align-items:center;font-size:10px;letter-spacing:4px;color:rgba(170,136,85,0.3);}
.sig-bars{display:flex;gap:3px;align-items:flex-end;}
.sig-bar{width:4px;background:rgba(170,136,85,0.6);}
@keyframes barP{from{opacity:0.2}to{opacity:0.9}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="scanlines"></div>
<div class="ui">
  <div class="corner corner--tl"></div><div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div><div class="corner corner--br"></div>
  <div class="top-bar">KYOUKAI &nbsp;/&nbsp; 管理人室 &nbsp;──&nbsp; 管理 継続中</div>
  <div class="rec"><div class="rec-dot"></div>REC</div>
  <div class="freq-block">
    <div class="label">入室番号</div>
    <div class="freq-value" id="freq">----.---</div>
    <div class="unit">────</div>
  </div>
  <div class="source-block">
    <div class="label" style="text-align:right">室内状況</div>
    <div class="source-value">管理人</div>
  </div>
  <div class="frags" id="fragsEl"></div>
  <div class="bottom-bar">
    <div>管理 継続中</div>
    <div class="sig-bars" id="barsEl"></div>
    <div id="ts"></div>
  </div>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=1920; canvas.height=1080;

let retrot=0;
function drawCanvas(){
  const id=ctx.createImageData(1920,1080); const d=id.data;
  for(let i=0;i<d.length;i+=4){
    const on=Math.random()>0.85; const v=on?Math.floor(20+Math.random()*60):0;
    d[i]=Math.floor(v*0.9); d[i+1]=Math.floor(v*0.7); d[i+2]=Math.floor(v*0.3); d[i+3]=on?180:0;
  }
  ctx.putImageData(id,0,0);
  const scan=Math.floor(retrot*2)%1080;
  ctx.fillStyle='rgba(255,200,100,0.04)'; ctx.fillRect(0,scan,1920,3);
  retrot++;
  requestAnimationFrame(drawCanvas);
}
drawCanvas();

let fv=80+Math.random()*900;
const freqEl=document.getElementById('freq');
setInterval(()=>{fv+=(Math.random()-.5)*.5;freqEl.textContent=fv.toFixed(3);},250);
const fragsEl=document.getElementById('fragsEl');
  const _f0=document.createElement('div');
  _f0.className='frag';
  _f0.textContent="管理人 不在";
  _f0.style.cssText=`left:${5+Math.random()*88}%;top:${8+Math.random()*82}%;animation:fragFade ${5+Math.random()*7}s ease-in-out ${Math.random()*10}s infinite;`;
  fragsEl.appendChild(_f0);
  const _f1=document.createElement('div');
  _f1.className='frag';
  _f1.textContent="呼び鈴 未応答";
  _f1.style.cssText=`left:${5+Math.random()*88}%;top:${8+Math.random()*82}%;animation:fragFade ${5+Math.random()*7}s ease-in-out ${Math.random()*10}s infinite;`;
  fragsEl.appendChild(_f1);
  const _f2=document.createElement('div');
  _f2.className='frag';
  _f2.textContent="鍵 管理中";
  _f2.style.cssText=`left:${5+Math.random()*88}%;top:${8+Math.random()*82}%;animation:fragFade ${5+Math.random()*7}s ease-in-out ${Math.random()*10}s infinite;`;
  fragsEl.appendChild(_f2);
  const _f3=document.createElement('div');
  _f3.className='frag';
  _f3.textContent="消滅の鍵 保管";
  _f3.style.cssText=`left:${5+Math.random()*88}%;top:${8+Math.random()*82}%;animation:fragFade ${5+Math.random()*7}s ease-in-out ${Math.random()*10}s infinite;`;
  fragsEl.appendChild(_f3);
  const _f4=document.createElement('div');
  _f4.className='frag';
  _f4.textContent="BOOTH 荷物あり";
  _f4.style.cssText=`left:${5+Math.random()*88}%;top:${8+Math.random()*82}%;animation:fragFade ${5+Math.random()*7}s ease-in-out ${Math.random()*10}s infinite;`;
  fragsEl.appendChild(_f4);
  const _f5=document.createElement('div');
  _f5.className='frag';
  _f5.textContent="日誌 更新済み";
  _f5.style.cssText=`left:${5+Math.random()*88}%;top:${8+Math.random()*82}%;animation:fragFade ${5+Math.random()*7}s ease-in-out ${Math.random()*10}s infinite;`;
  fragsEl.appendChild(_f5);
  const _f6=document.createElement('div');
  _f6.className='frag';
  _f6.textContent="── いらっしゃい";
  _f6.style.cssText=`left:${5+Math.random()*88}%;top:${8+Math.random()*82}%;animation:fragFade ${5+Math.random()*7}s ease-in-out ${Math.random()*10}s infinite;`;
  fragsEl.appendChild(_f6);
  const _f7=document.createElement('div');
  _f7.className='frag';
  _f7.textContent="賽銭箱 確認";
  _f7.style.cssText=`left:${5+Math.random()*88}%;top:${8+Math.random()*82}%;animation:fragFade ${5+Math.random()*7}s ease-in-out ${Math.random()*10}s infinite;`;
  fragsEl.appendChild(_f7);
  const _f8=document.createElement('div');
  _f8.className='frag';
  _f8.textContent="目玉 観測";
  _f8.style.cssText=`left:${5+Math.random()*88}%;top:${8+Math.random()*82}%;animation:fragFade ${5+Math.random()*7}s ease-in-out ${Math.random()*10}s infinite;`;
  fragsEl.appendChild(_f8);
  const _f9=document.createElement('div');
  _f9.className='frag';
  _f9.textContent="管理日誌 閲覧可";
  _f9.style.cssText=`left:${5+Math.random()*88}%;top:${8+Math.random()*82}%;animation:fragFade ${5+Math.random()*7}s ease-in-out ${Math.random()*10}s infinite;`;
  fragsEl.appendChild(_f9);
const barsEl=document.getElementById('barsEl');
[8,12,18,22,18,14,10,14,20,22,18,12].forEach((h,i)=>{
  const b=document.createElement('div');b.className='sig-bar';b.style.height=h+'px';
  b.style.animation=`barP ${(0.3+Math.random()*.8).toFixed(2)}s ease-in-out ${(Math.random()*.4).toFixed(2)}s infinite alternate`;
  barsEl.appendChild(b);
});
const tsEl=document.getElementById('ts');
setInterval(()=>{tsEl.textContent=new Date().toISOString().replace('T',' ').slice(0,19);},1000);
tsEl.textContent=new Date().toISOString().replace('T',' ').slice(0,19);
</script>
</body>
</html>
