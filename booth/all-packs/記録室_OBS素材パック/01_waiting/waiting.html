<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>記録室 - 待機画面</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;background:#020408;overflow:hidden;font-family:Consolas,'Courier New',monospace;color:#8899aa;}

/* .arc- プレフィックス付き固有クラス群(ファイル棚グリッド) */
.arc-shelf-wrap{position:absolute;inset:0;width:1920px;height:1080px;z-index:10;padding:70px 90px;}
.arc-shelf-title{font-size:13px;letter-spacing:7px;color:rgba(136,153,170,0.55);text-transform:uppercase;margin-bottom:28px;text-align:center;}
.arc-shelf-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);gap:28px;height:840px;}
.arc-card{position:relative;border:1px solid rgba(136,153,170,0.28);background:linear-gradient(150deg,rgba(136,153,170,0.05),rgba(0,0,0,0.3));padding:22px;display:flex;flex-direction:column;justify-content:space-between;opacity:0.15;transform:scale(0.94);transition:opacity .5s ease,transform .5s ease;}
.arc-card.arc-card-active{opacity:1;transform:scale(1);border-color:rgba(136,153,170,0.6);box-shadow:0 0 24px rgba(136,153,170,0.12);}
.arc-card-id{font-size:12px;letter-spacing:2px;color:rgba(136,153,170,0.5);}
.arc-card-date{font-size:10px;letter-spacing:2px;color:rgba(136,153,170,0.3);margin-top:4px;}
.arc-card-body{font-size:14px;line-height:1.7;color:rgba(136,153,170,0.82);margin-top:14px;}
.arc-card-tag{position:absolute;top:14px;right:16px;font-size:9px;letter-spacing:3px;color:rgba(136,153,170,0.4);}
.arc-footer{position:absolute;bottom:56px;left:90px;right:90px;display:flex;justify-content:space-between;font-size:10px;letter-spacing:4px;color:rgba(136,153,170,0.35);}
canvas{position:absolute;top:0;left:0;width:1920px;height:1080px;z-index:1;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="arc-shelf-wrap">
  <div class="arc-shelf-title">KYOUKAI ARCHIVE // カルテラック照合中</div>
  <div class="arc-shelf-grid" id="arc-grid"></div>
  <div class="arc-footer">
    <div>記録 照合中</div>
    <div id="arc-clock"></div>
  </div>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=1920;canvas.height=1080;
function drawDust(){
  ctx.fillStyle='rgba(136,153,170,0.02)';
  ctx.fillRect(0,0,1920,1080);
  for(let i=0;i<40;i++){
    ctx.fillStyle='rgba(136,153,170,'+(0.02+Math.random()*0.04)+')';
    ctx.fillRect(Math.random()*1920,Math.random()*1080,1,1);
  }
  requestAnimationFrame(drawDust);
}
drawDust();

const RECORDS=[{"id": "0x00441", "date": "20XX-??-??", "body": "削除済みデータ。復元不能。"}, {"id": "0x00442", "date": "20XX-??-??", "body": "感情 排除。記録のみ残る。"}, {"id": "0x00443", "date": "不明", "body": "存在 確認済み。詳細は[REDACTED]。"}, {"id": "0x00444", "date": "20XX-??-??", "body": "アーカイブ照合 中。該当なし。"}, {"id": "0x00445", "date": "不明", "body": "file_001.log ── 参照履歴あり。"}, {"id": "0x00446", "date": "20XX-??-??", "body": "記録元: システム。改変痕跡なし。"}];
const grid=document.getElementById('arc-grid');
const SLOTS=6;
let assigned=[];
for(let i=0;i<SLOTS;i++){
  const card=document.createElement('div');
  card.className='arc-card';
  grid.appendChild(card);
  assigned.push(RECORDS[i%RECORDS.length]);
}
function renderCard(i){
  const card=grid.children[i];
  const rec=assigned[i];
  card.innerHTML=`<div class="arc-card-tag">FILE</div><div class="arc-card-id">${rec.id}</div><div class="arc-card-date">${rec.date}</div><div class="arc-card-body">${rec.body}</div>`;
}
for(let i=0;i<SLOTS;i++) renderCard(i);
function cycleSlot(){
  const i=Math.floor(Math.random()*SLOTS);
  const card=grid.children[i];
  card.classList.remove('arc-card-active');
  setTimeout(()=>{
    assigned[i]=RECORDS[Math.floor(Math.random()*RECORDS.length)];
    renderCard(i);
    card.classList.add('arc-card-active');
  },450);
}
[...grid.children].forEach((c,i)=>setTimeout(()=>c.classList.add('arc-card-active'),i*140));
setInterval(cycleSlot,1800);

const clockEl=document.getElementById('arc-clock');
function tick(){clockEl.textContent=new Date().toISOString().replace('T',' ').slice(0,19);}
tick();setInterval(tick,1000);
</script>
</body>
</html>
