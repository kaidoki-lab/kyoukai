<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>記録室 - 離席中</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;background:#020408;overflow:hidden;font-family:Consolas,'Courier New',monospace;color:#8899aa;}

/* .arc- プレフィックス付き固有クラス群(単一カードが1枚ずつめくれる骨格。waitingのグリッドとは別構成) */
.arc-flip-stage{position:absolute;inset:0;width:1920px;height:1080px;z-index:10;display:flex;align-items:center;justify-content:center;perspective:1800px;}
.arc-flip-card{width:560px;height:400px;position:relative;transform-style:preserve-3d;animation:arcFlip 3.6s ease-in-out infinite;border:1px solid rgba(136,153,170,0.35);background:linear-gradient(150deg,rgba(136,153,170,0.06),rgba(0,0,0,0.35));padding:32px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 0 40px rgba(136,153,170,0.1);}
@keyframes arcFlip{0%,40%{transform:rotateY(0deg)}50%{transform:rotateY(90deg)}60%,100%{transform:rotateY(0deg)}}
.arc-flip-id{font-size:14px;letter-spacing:3px;color:rgba(136,153,170,0.6);}
.arc-flip-status{font-size:12px;letter-spacing:5px;color:rgba(136,153,170,0.55);text-transform:uppercase;margin-top:20px;}
.arc-flip-body{font-size:17px;line-height:1.9;color:rgba(136,153,170,0.86);margin-top:24px;}
.arc-flip-footer{position:absolute;bottom:56px;left:0;right:0;text-align:center;font-size:11px;letter-spacing:6px;color:rgba(136,153,170,0.35);}
canvas{position:absolute;top:0;left:0;width:1920px;height:1080px;z-index:1;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="arc-flip-stage">
  <div class="arc-flip-card" id="arc-card">
    <div class="arc-flip-status">照合中</div>
    <div class="arc-flip-id" id="arc-id"></div>
    <div class="arc-flip-body" id="arc-body"></div>
  </div>
</div>
<div class="arc-flip-footer">削除されたはずの記録が残っています</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=1920;canvas.height=1080;
function draw(){
  ctx.fillStyle='rgba(136,153,170,0.015)';
  ctx.fillRect(0,0,1920,1080);
  requestAnimationFrame(draw);
}
draw();

const RECORDS=[{"id": "0x00441", "date": "20XX-??-??", "body": "削除済みデータ。復元不能。"}, {"id": "0x00442", "date": "20XX-??-??", "body": "感情 排除。記録のみ残る。"}, {"id": "0x00443", "date": "不明", "body": "存在 確認済み。詳細は[REDACTED]。"}, {"id": "0x00444", "date": "20XX-??-??", "body": "アーカイブ照合 中。該当なし。"}, {"id": "0x00445", "date": "不明", "body": "file_001.log ── 参照履歴あり。"}, {"id": "0x00446", "date": "20XX-??-??", "body": "記録元: システム。改変痕跡なし。"}];
let ri=0;
const idEl=document.getElementById('arc-id');
const bodyEl=document.getElementById('arc-body');
function setRecord(){
  const rec=RECORDS[ri%RECORDS.length];
  idEl.textContent=rec.id+' / '+rec.date;
  bodyEl.textContent=rec.body;
  ri++;
}
setRecord();
setInterval(setRecord,3600);
</script>
</body>
</html>
