<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>逆観測室 - 待機画面</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;background:#050505;overflow:hidden;font-family:'Courier New',monospace;color:#ffffff;}

/* .obsr- プレフィックス付き固有クラス群(中央瞳孔+UI最小限) */
.obsr-stage{position:absolute;inset:0;width:1920px;height:1080px;z-index:10;display:flex;align-items:center;justify-content:center;}
.obsr-iris-wrap{position:relative;width:520px;height:520px;}
.obsr-ring{position:absolute;border-radius:50%;border:1px solid rgba(255,255,255,0.5);}
.obsr-ring--outer{inset:0;animation:obsrRingSpin 60s linear infinite;}
.obsr-ring--mid{inset:60px;border-color:rgba(255,255,255,0.3);animation:obsrRingSpin 42s linear infinite reverse;}
.obsr-ring--inner{inset:150px;border-color:rgba(255,255,255,0.7);}
@keyframes obsrRingSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.obsr-pupil{position:absolute;left:50%;top:50%;width:120px;height:120px;margin:-60px 0 0 -60px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#fff 0%,#d9d9d9 55%,#050505 100%);box-shadow:0 0 60px rgba(255,255,255,0.35);animation:obsrPupilPulse 4.5s ease-in-out infinite;}
@keyframes obsrPupilPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.obsr-caption{position:absolute;bottom:96px;left:0;width:100%;text-align:center;font-size:13px;letter-spacing:10px;color:rgba(255,255,255,0.55);text-transform:uppercase;}
.obsr-corner-label{position:absolute;top:64px;left:90px;font-size:12px;letter-spacing:5px;color:rgba(255,255,255,0.4);}
.obsr-whisper{position:absolute;font-size:15px;letter-spacing:3px;color:rgba(255,255,255,0.0);white-space:nowrap;pointer-events:none;}
canvas{position:absolute;top:0;left:0;width:1920px;height:1080px;z-index:1;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="obsr-corner-label">KYOUKAI // 逆観測室</div>
<div class="obsr-stage">
  <div class="obsr-iris-wrap">
    <div class="obsr-ring obsr-ring--outer"></div>
    <div class="obsr-ring obsr-ring--mid"></div>
    <div class="obsr-ring obsr-ring--inner"></div>
    <div class="obsr-pupil"></div>
  </div>
</div>
<div class="obsr-caption">観測は継続されています</div>
<div id="obsr-whisper-layer"></div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=1920;canvas.height=1080;
function drawField(){
  ctx.clearRect(0,0,1920,1080);
  ctx.strokeStyle='rgba(255,255,255,0.035)';
  ctx.lineWidth=1;
  const cx=960,cy=540;
  for(let r=560;r<1400;r+=140){
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.stroke();
  }
  requestAnimationFrame(drawField);
}
drawField();

// 視線を感じる構図: たまに囁きがフェードイン/アウトする
const WHISPERS=['あなたは', 'ずっと', '観測されていた', '気づいていましたか', '最初から', 'ここにいた', '見ていたのは', 'あなたではない', '静かに', '逃げられない'];
const layer=document.getElementById('obsr-whisper-layer');
function spawnWhisper(){
  const el=document.createElement('div');
  el.className='obsr-whisper';
  el.textContent=WHISPERS[Math.floor(Math.random()*WHISPERS.length)];
  el.style.left=(200+Math.random()*1500)+'px';
  el.style.top=(150+Math.random()*750)+'px';
  el.style.transition='color 2.4s ease';
  layer.appendChild(el);
  requestAnimationFrame(()=>{el.style.color='rgba(255,255,255,0.32)';});
  setTimeout(()=>{el.style.color='rgba(255,255,255,0)';},2600);
  setTimeout(()=>{layer.removeChild(el);},5200);
}
setInterval(spawnWhisper,3400);
</script>
</body>
</html>
