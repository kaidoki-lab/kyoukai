<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>粒子観測 - ローワーサード</title>
<!--
  OBS設定: ブラウザソース → このHTMLを指定 → 幅1920 高さ1080
  名前変更: ?name=&title= のURLパラメータで指定してください
-->
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;background:transparent;overflow:hidden;font-family:'Courier New',monospace;}

/* .ptc- プレフィックス付き固有クラス群(名前の周囲を粒子が公転する) */
.ptc-lt-wrap{position:absolute;bottom:90px;left:90px;}
.ptc-lt-orbit{position:absolute;left:0;top:0;}
.ptc-lt-name{position:relative;font-size:34px;letter-spacing:3px;color:rgba(255,255,255,0.94);padding:18px 40px;background:rgba(0,4,8,0.55);border:1px solid rgba(68,153,255,0.4);z-index:2;}
.ptc-lt-title{position:absolute;left:0;top:76px;font-size:11px;letter-spacing:4px;color:rgba(68,153,255,0.6);z-index:2;}
</style>
</head>
<body>
<div class="ptc-lt-wrap">
  <canvas class="ptc-lt-orbit" id="ptcOrbit" width="420" height="140"></canvas>
  <div class="ptc-lt-name" id="name-el">名前</div>
  <div class="ptc-lt-title" id="title-el">LIVE</div>
</div>
<script>
const p=new URLSearchParams(window.location.search);
document.getElementById('name-el').textContent=p.get('name')||'名前';
document.getElementById('title-el').textContent=p.get('title')||'LIVE';

(function(){
  var cv=document.getElementById('ptcOrbit');
  var ctx=cv.getContext('2d');
  var COLORS={"r": [255, 55, 55], "b": [55, 148, 255], "y": [255, 220, 30]};
  var W=cv.width,H=cv.height;
  var cx=W*0.5,cy=H*0.5;
  var N=18;
  var pts=[];
  for(var i=0;i<N;i++){
    var f=i/N;
    pts.push({
      angle:f*Math.PI*2,
      radius:70+Math.random()*30,
      speed:0.006+Math.random()*0.008,
      t:i%3===0?'r':i%3===1?'b':'y',
      sz:2+Math.random()*1.4
    });
  }
  function loop(){
    ctx.clearRect(0,0,W,H);
    for(var i=0;i<pts.length;i++){
      var pt=pts[i];
      pt.angle+=pt.speed;
      var x=cx+Math.cos(pt.angle)*pt.radius;
      var y=cy+Math.sin(pt.angle)*pt.radius*0.42;
      var c=COLORS[pt.t];
      ctx.fillStyle='rgb('+c[0]+','+c[1]+','+c[2]+')';
      ctx.beginPath();
      ctx.arc(x,y,pt.sz,0,Math.PI*2);
      ctx.fill();
    }
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
</body>
</html>
