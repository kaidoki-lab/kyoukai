<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>粒子観測 - 離席中</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;background:#000408;overflow:hidden;font-family:'Courier New',monospace;color:#4499ff;}

/* .ptc- プレフィックス付き固有クラス群(waitingとは骨格が異なる: 収束ループ専用の中央集約構図) */
.ptc-brb-stage{position:absolute;inset:0;width:1920px;height:1080px;}
.ptc-brb-msg{position:absolute;bottom:120px;left:0;width:100%;text-align:center;font-size:28px;letter-spacing:6px;color:#4499ff;text-shadow:0 0 16px rgba(68,153,255,0.6);}
.ptc-brb-label{position:absolute;top:60px;left:0;width:100%;text-align:center;font-size:13px;letter-spacing:8px;color:rgba(68,153,255,0.55);}
</style>
</head>
<body>
<canvas class="ptc-brb-stage" id="ptcBrbCanvas"></canvas>
<div class="ptc-brb-label">粒子 収束観測</div>
<div class="ptc-brb-msg">粒子が一点に収束しています</div>
<script>
(function(){
  var W=1920,H=1080;
  var cv=document.getElementById('ptcBrbCanvas');
  cv.width=W;cv.height=H;
  var ctx=cv.getContext('2d');
  var COLORS={"r": [255, 55, 55], "b": [55, 148, 255], "y": [255, 220, 30]};
  var cx=W*0.5,cy=H*0.5;
  var N=300;
  var pts=[];
  function reset(){
    pts=[];
    for(var i=0;i<N;i++){
      var f=i/N;
      var t=f<0.4?'r':f<0.8?'b':'y';
      var ang=Math.random()*Math.PI*2;
      var rad=200+Math.random()*420;
      pts.push({
        x:cx+Math.cos(ang)*rad,
        y:cy+Math.sin(ang)*rad,
        t:t,
        sz:t==='r'?2.6:t==='b'?2.0:2.2
      });
    }
  }
  reset();
  var progress=0;
  function step(){
    progress+=0.0032;
    if(progress>=1){progress=0;reset();}
    for(var i=0;i<pts.length;i++){
      var p=pts[i];
      p.x+=(cx-p.x)*0.012;
      p.y+=(cy-p.y)*0.012;
    }
  }
  function draw(){
    ctx.fillStyle='#000408';
    ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(68,153,255,'+(0.12+progress*0.3).toFixed(3)+')';
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.arc(cx,cy,10+progress*30,0,Math.PI*2);
    ctx.stroke();
    ['r','b','y'].forEach(function(type){
      var c=COLORS[type];
      ctx.fillStyle='rgb('+c[0]+','+c[1]+','+c[2]+')';
      ctx.beginPath();
      for(var i=0;i<pts.length;i++){
        var p=pts[i];
        if(p.t!==type)continue;
        ctx.moveTo(p.x+p.sz,p.y);
        ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);
      }
      ctx.fill();
    });
  }
  function loop(){
    step();
    draw();
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
</body>
</html>
