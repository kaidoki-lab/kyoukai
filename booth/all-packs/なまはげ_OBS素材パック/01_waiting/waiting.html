<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>なまはげ - 待機画面</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;background:#040000;overflow:hidden;font-family:'Courier New',monospace;color:#ff2200;}

/* .nmh- プレフィックス付き固有クラス群(本体画像+ドット目Canvas) */
.nmh-bg{position:absolute;top:0;left:0;width:1920px;height:1080px;background-color:#000;background-image:url('assets/namahage-room-9x16.png');background-repeat:no-repeat;background-position:center center;background-size:auto 1080px;z-index:1;}
.nmh-bg::before,.nmh-bg::after{content:'';position:absolute;top:0;bottom:0;width:35%;z-index:2;}
.nmh-bg-fade-left{position:absolute;top:0;left:0;width:35%;height:100%;background:linear-gradient(to right,#000 0%,rgba(0,0,0,0) 100%);z-index:2;}
.nmh-bg-fade-right{position:absolute;top:0;right:0;width:35%;height:100%;background:linear-gradient(to left,#000 0%,rgba(0,0,0,0) 100%);z-index:2;}
.nmh-eye-layer{position:absolute;left:50%;top:50%;width:520px;height:390px;margin:-260px 0 0 -260px;z-index:6;display:flex;gap:36px;align-items:center;justify-content:center;}
.nmh-eye-canvas{width:224px;height:168px;image-rendering:pixelated;image-rendering:crisp-edges;filter:drop-shadow(0 0 14px rgba(255,34,0,0.85));}
.nmh-label{position:absolute;top:66px;left:0;width:100%;text-align:center;font-size:12px;letter-spacing:8px;color:rgba(255,34,0,0.55);z-index:6;text-transform:uppercase;}
.nmh-caption{position:absolute;bottom:96px;left:0;width:100%;text-align:center;font-size:14px;letter-spacing:5px;color:rgba(255,34,0,0.6);z-index:6;}
</style>
</head>
<body>
<div class="nmh-bg"></div>
<div class="nmh-bg-fade-left"></div>
<div class="nmh-bg-fade-right"></div>
<div class="nmh-label">KYOUKAI // なまはげ</div>
<div class="nmh-eye-layer">
  <canvas class="nmh-eye-canvas" id="eyeL" width="16" height="12"></canvas>
  <canvas class="nmh-eye-canvas" id="eyeR" width="16" height="12"></canvas>
</div>
<div class="nmh-caption">観測 中</div>
<script>
const ctxL=document.getElementById('eyeL').getContext('2d');
const ctxR=document.getElementById('eyeR').getContext('2d');
const COLS=16,ROWS=12;
const GAZE=[{"x": 6, "y": 4}, {"x": 2, "y": 4}, {"x": 10, "y": 4}, {"x": 6, "y": 1}, {"x": 6, "y": 7}, {"x": 4, "y": 4}, {"x": 8, "y": 4}];

function emptyGrid(){return Array.from({length:ROWS},()=>new Array(COLS).fill(0));}
function dotGrid(cx,cy){
  const g=emptyGrid();
  for(let r=0;r<2;r++)for(let c=0;c<2;c++){
    const gr=cy+r,gc=cx+c;
    if(gr>=0&&gr<ROWS&&gc>=0&&gc<COLS)g[gr][gc]=1;
  }
  return g;
}
function lineGrid(){
  return emptyGrid().map((row,r)=>r===5?row.map((_,c)=>(c>=5&&c<=10)?1:0):row);
}
function renderEye(ctx,grid){
  ctx.clearRect(0,0,COLS,ROWS);
  ctx.fillStyle='#ffffff';
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(grid[r][c])ctx.fillRect(c,r,1,1);
  }
}

let pos=GAZE[0];
function idleGaze(){
  pos=GAZE[Math.floor(Math.random()*GAZE.length)];
  renderEye(ctxL,dotGrid(pos.x,pos.y));
  renderEye(ctxR,dotGrid(pos.x,pos.y));
  setTimeout(idleGaze,1500+Math.random()*2500);
}
idleGaze();

function blink(){
  renderEye(ctxL,lineGrid());
  renderEye(ctxR,lineGrid());
  setTimeout(()=>{
    renderEye(ctxL,emptyGrid());
    renderEye(ctxR,emptyGrid());
    setTimeout(()=>{
      renderEye(ctxL,dotGrid(pos.x,pos.y));
      renderEye(ctxR,dotGrid(pos.x,pos.y));
    },80);
  },60);
  setTimeout(blink,3000+Math.random()*5000);
}
setTimeout(blink,2000);
</script>
</body>
</html>
