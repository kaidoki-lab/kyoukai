<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>なまはげ - ローワーサード</title>
<!--
  OBS設定: ブラウザソース → このHTMLを指定 → 幅1920 高さ1080
  名前変更: ?name=&title= のURLパラメータで指定してください
-->
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;background:transparent;overflow:hidden;font-family:'Courier New',monospace;}

/* .nmh- プレフィックス付き固有クラス群(名前の横にドット目が付く) */
.nmh-lt-frame{position:absolute;bottom:80px;left:80px;display:flex;align-items:center;gap:20px;padding:16px 26px;background:rgba(4,0,0,0.6);border:1px solid rgba(255,34,0,0.4);}
.nmh-lt-eyes{display:flex;gap:10px;}
.nmh-lt-eye{width:22px;height:16px;border-radius:50%;background:radial-gradient(circle,rgba(255,34,0,0.95) 0%,rgba(255,34,0,0.3) 70%);animation:nmhLtBlink 4s ease-in-out infinite;}
.nmh-lt-eye:nth-child(2){animation-delay:.2s;}
@keyframes nmhLtBlink{0%,92%,100%{transform:scaleY(1)}96%{transform:scaleY(0.1)}}
.nmh-lt-name{font-size:32px;letter-spacing:3px;color:rgba(255,255,255,0.94);}
.nmh-lt-title{position:absolute;left:80px;bottom:52px;font-size:11px;letter-spacing:4px;color:rgba(255,34,0,0.55);}
</style>
</head>
<body>
<div class="nmh-lt-frame">
  <div class="nmh-lt-eyes">
    <div class="nmh-lt-eye"></div>
    <div class="nmh-lt-eye"></div>
  </div>
  <span class="nmh-lt-name" id="name-el">名前</span>
</div>
<div class="nmh-lt-title" id="title-el">KYOUKAI</div>
<script>
const p=new URLSearchParams(window.location.search);
document.getElementById('name-el').textContent=p.get('name')||'名前';
document.getElementById('title-el').textContent=p.get('title')||'KYOUKAI';
</script>
</body>
</html>
