<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>受信域 - 待機画面</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1920px; height: 1080px;
  background: #000;
  overflow: hidden;
  font-family: 'Courier New', Courier, monospace;
  color: #00ddaa;
}
canvas {
  position: absolute;
  top: 0; left: 0;
  width: 1920px; height: 1080px;
}
.scanlines {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 3px,
    rgba(0,0,0,0.12) 3px, rgba(0,0,0,0.12) 4px
  );
  pointer-events: none;
  z-index: 20;
}
.ui {
  position: absolute; top: 0; left: 0;
  width: 1920px; height: 1080px;
  z-index: 10;
}
.corner {
  position: absolute;
  width: 36px; height: 36px;
}
.corner--tl { top: 48px; left: 48px; border-top: 1px solid #00ddaa; border-left: 1px solid #00ddaa; }
.corner--tr { top: 48px; right: 48px; border-top: 1px solid #00ddaa; border-right: 1px solid #00ddaa; }
.corner--bl { bottom: 48px; left: 48px; border-bottom: 1px solid #00ddaa; border-left: 1px solid #00ddaa; }
.corner--br { bottom: 48px; right: 48px; border-bottom: 1px solid #00ddaa; border-right: 1px solid #00ddaa; }
.top-bar {
  position: absolute;
  top: 54px; left: 0; right: 0;
  text-align: center;
  font-size: 11px;
  letter-spacing: 8px;
  color: rgba(0,221,170,0.35);
  text-transform: uppercase;
}
.rec {
  position: absolute;
  top: 50px; right: 100px;
  display: flex; align-items: center; gap: 8px;
  font-size: 10px; letter-spacing: 4px;
  color: rgba(0,221,170,0.5);
}
.rec-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #00ddaa;
  box-shadow: 0 0 6px #00ddaa;
  animation: blink 1.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }
.freq-block {
  position: absolute;
  left: 100px;
  top: 50%; transform: translateY(-50%);
}
.label {
  font-size: 10px; letter-spacing: 4px;
  color: rgba(0,221,170,0.3);
  margin-bottom: 6px;
}
.freq-value {
  font-size: 38px; letter-spacing: 3px;
  color: rgba(0,221,170,0.75);
  text-shadow: 0 0 20px rgba(0,221,170,0.4);
}
.unit {
  font-size: 10px; letter-spacing: 4px;
  color: rgba(0,221,170,0.2);
  margin-top: 4px;
}
.source-block {
  position: absolute;
  right: 100px;
  top: 50%; transform: translateY(-50%);
  text-align: right;
}
.source-value {
  font-size: 16px; letter-spacing: 4px;
  color: rgba(0,221,170,0.45);
  margin-top: 6px;
}
.fragments {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 5;
}
.frag {
  position: absolute;
  font-size: 10px; letter-spacing: 2px;
  color: rgba(0,221,170,0.18);
  white-space: nowrap;
}
.bottom-bar {
  position: absolute;
  bottom: 56px; left: 100px; right: 100px;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 10px; letter-spacing: 4px;
  color: rgba(0,221,170,0.3);
}
.signal-bars { display: flex; gap: 3px; align-items: flex-end; }
.bar {
  width: 4px;
  background: rgba(0,221,170,0.6);
}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div class="scanlines"></div>

<div class="ui">
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <div class="top-bar">KYOUKAI &nbsp;/&nbsp; 受信域 &nbsp;──&nbsp; 観測継続中</div>

  <div class="rec"><div class="rec-dot"></div>REC</div>

  <div class="freq-block">
    <div class="label">FREQUENCY</div>
    <div class="freq-value" id="freq">----.---</div>
    <div class="unit">MHz</div>
  </div>

  <div class="source-block">
    <div class="label" style="text-align:right">SIGNAL SOURCE</div>
    <div class="source-value">未特定</div>
  </div>

  <div class="fragments" id="frags"></div>

  <div class="bottom-bar">
    <div>受信継続中</div>
    <div class="signal-bars" id="bars"></div>
    <div id="ts"></div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 1920;
canvas.height = 1080;

let t = 0;

function draw() {
  ctx.clearRect(0, 0, 1920, 1080);

  // Grid
  ctx.strokeStyle = 'rgba(0,221,170,0.025)';
  ctx.lineWidth = 1;
  for (let x = 0; x < 1920; x += 80) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,1080); ctx.stroke();
  }
  for (let y = 0; y < 1080; y += 80) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(1920,y); ctx.stroke();
  }

  const cy = 1080 / 2;

  // Wave glow layers
  [[10, 0.025], [6, 0.05], [3, 0.12], [1.5, 0.55]].forEach(([lw, alpha]) => {
    ctx.strokeStyle = `rgba(0,221,170,${alpha})`;
    ctx.lineWidth = lw;
    ctx.beginPath();
    for (let x = 0; x < 1920; x++) {
      const noise = (Math.random() - 0.5) * (lw < 2 ? 10 : 0);
      const w1 = Math.sin((x / 1920) * Math.PI * 7 + t) * 55;
      const w2 = Math.sin((x / 1920) * Math.PI * 16 + t * 1.5) * 18;
      const w3 = Math.sin((x / 1920) * Math.PI * 3 + t * 0.6) * 35;
      const y = cy + w1 + w2 + w3 + noise;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  });

  // Horizontal center line (faint)
  ctx.strokeStyle = 'rgba(0,221,170,0.07)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 12]);
  ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(1920, cy); ctx.stroke();
  ctx.setLineDash([]);

  t += 0.018;
  requestAnimationFrame(draw);
}
draw();

// Frequency drift
let freqVal = 89.4 + Math.random() * 15;
const freqEl = document.getElementById('freq');
setInterval(() => {
  freqVal += (Math.random() - 0.5) * 0.3;
  freqEl.textContent = freqVal.toFixed(3);
}, 250);

// Fragments
const texts = [
  '信号を確認','発信源 未特定','受信継続中',
  'ノイズレベル：不安定','接続 ── ── ──','解析中',
  '送信者：不明','周波数：----','断片 受信',
  '観測開始','// ERROR: SOURCE_NOT_FOUND',
  '受信データ 断片的','SIGNAL DETECTED',
  '送信元 追跡不能','記録 開始',
  'データ 欠損','──────────','識別 不能',
];
const fragsEl = document.getElementById('frags');
texts.forEach(text => {
  const el = document.createElement('div');
  el.className = 'frag';
  el.textContent = text;
  const dur = 5 + Math.random() * 7;
  const delay = Math.random() * 10;
  el.style.cssText = `
    left:${5 + Math.random() * 88}%;
    top:${8 + Math.random() * 82}%;
    animation: fragFade ${dur}s ease-in-out ${delay}s infinite;
  `;
  fragsEl.appendChild(el);
});

const style = document.createElement('style');
style.textContent = `
  @keyframes fragFade {
    0%,100%{opacity:0} 15%,85%{opacity:1}
  }
`;
document.head.appendChild(style);

// Signal bars
const barsEl = document.getElementById('bars');
[8,12,18,22,18,14,10,14,20,22,18,12].forEach((h, i) => {
  const bar = document.createElement('div');
  bar.className = 'bar';
  bar.style.height = h + 'px';
  const dur = (0.3 + Math.random() * 0.8).toFixed(2);
  const delay = (Math.random() * 0.4).toFixed(2);
  bar.style.animation = `barPulse ${dur}s ease-in-out ${delay}s infinite alternate`;
  barsEl.appendChild(bar);
});
document.head.appendChild(Object.assign(document.createElement('style'), {
  textContent: `@keyframes barPulse{from{opacity:0.25}to{opacity:0.9}}`
}));

// Timestamp
const tsEl = document.getElementById('ts');
setInterval(() => {
  tsEl.textContent = new Date().toISOString().replace('T',' ').slice(0,19);
}, 1000);
tsEl.textContent = new Date().toISOString().replace('T',' ').slice(0,19);
</script>
</body>
</html>
