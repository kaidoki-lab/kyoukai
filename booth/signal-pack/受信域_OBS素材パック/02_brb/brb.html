<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>受信域 - 離席中</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1920px; height: 1080px;
  background: #000;
  overflow: hidden;
  font-family: 'Courier New', Courier, monospace;
  color: #00ddaa;
}
canvas {
  position: absolute; top: 0; left: 0;
  width: 1920px; height: 1080px;
}
.vignette {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  background: radial-gradient(ellipse 55% 55% at 50% 50%,
    rgba(0,0,0,0.85) 0%,
    rgba(0,0,0,0.5) 50%,
    transparent 100%
  );
  z-index: 5;
}
.scanlines {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 3px,
    rgba(0,0,0,0.15) 3px, rgba(0,0,0,0.15) 4px
  );
  pointer-events: none;
  z-index: 20;
}
.ui {
  position: absolute; top: 0; left: 0;
  width: 1920px; height: 1080px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.corner {
  position: absolute;
  width: 36px; height: 36px;
}
.corner--tl { top: 48px; left: 48px; border-top: 1px solid rgba(0,221,170,0.4); border-left: 1px solid rgba(0,221,170,0.4); }
.corner--tr { top: 48px; right: 48px; border-top: 1px solid rgba(0,221,170,0.4); border-right: 1px solid rgba(0,221,170,0.4); }
.corner--bl { bottom: 48px; left: 48px; border-bottom: 1px solid rgba(0,221,170,0.4); border-left: 1px solid rgba(0,221,170,0.4); }
.corner--br { bottom: 48px; right: 48px; border-bottom: 1px solid rgba(0,221,170,0.4); border-right: 1px solid rgba(0,221,170,0.4); }
.signal-lost {
  font-size: 11px;
  letter-spacing: 8px;
  color: rgba(0,221,170,0.3);
  margin-bottom: 48px;
  text-transform: uppercase;
}
.main-message {
  font-size: 48px;
  letter-spacing: 8px;
  color: rgba(0,221,170,0.85);
  text-shadow: 0 0 30px rgba(0,221,170,0.4), 0 0 60px rgba(0,221,170,0.15);
  text-align: center;
  animation: glitchText 8s ease-in-out infinite;
}
@keyframes glitchText {
  0%,90%,100% { transform: translate(0,0); opacity: 1; }
  91% { transform: translate(-3px, 1px); opacity: 0.8; clip-path: inset(20% 0 50% 0); }
  92% { transform: translate(3px, -1px); opacity: 0.9; clip-path: inset(60% 0 10% 0); }
  93% { transform: translate(0,0); opacity: 1; clip-path: none; }
}
.cursor {
  display: inline-block;
  width: 28px; height: 4px;
  background: rgba(0,221,170,0.7);
  vertical-align: middle;
  margin-left: 10px;
  animation: cursorBlink 1s step-end infinite;
}
@keyframes cursorBlink { 0%,100%{opacity:1} 50%{opacity:0} }
.status-msg {
  margin-top: 36px;
  font-size: 13px;
  letter-spacing: 5px;
  color: rgba(0,221,170,0.4);
  text-align: center;
  min-height: 20px;
}
.meter {
  margin-top: 56px;
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 10px;
  letter-spacing: 4px;
  color: rgba(0,221,170,0.25);
}
.meter-bars {
  display: flex; gap: 3px; align-items: flex-end;
}
.meter-bar {
  width: 5px;
  background: rgba(0,221,170,0.4);
}
.bottom-label {
  position: absolute;
  bottom: 56px; left: 0; right: 0;
  text-align: center;
  font-size: 10px;
  letter-spacing: 6px;
  color: rgba(0,221,170,0.2);
}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div class="vignette"></div>
<div class="scanlines"></div>

<div class="ui">
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <div class="signal-lost">── SIGNAL INTERRUPTED ──</div>

  <div class="main-message">
    接続を試みています<span class="cursor"></span>
  </div>

  <div class="status-msg" id="status"></div>

  <div class="meter">
    <span>SIGNAL</span>
    <div class="meter-bars" id="meter-bars"></div>
    <span id="signal-pct">──%</span>
  </div>

  <div class="bottom-label">受信を再開するまでしばらくお待ちください</div>
</div>

<script>
// Static noise canvas
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 1920;
canvas.height = 1080;

let glitchFrames = 0;

function drawStatic() {
  const imageData = ctx.createImageData(1920, 1080);
  const data = imageData.data;

  for (let i = 0; i < data.length; i += 4) {
    const on = Math.random() > 0.82;
    const v = on ? Math.floor(20 + Math.random() * 50) : 0;
    data[i]   = 0;
    data[i+1] = v;
    data[i+2] = Math.floor(v * 0.6);
    data[i+3] = on ? 200 : 0;
  }
  ctx.putImageData(imageData, 0, 0);

  // Row displacement glitch
  if (glitchFrames > 0) {
    glitchFrames--;
    const rows = Math.floor(Math.random() * 3) + 1;
    for (let r = 0; r < rows; r++) {
      const y = Math.floor(Math.random() * 1080);
      const h = Math.floor(Math.random() * 12) + 2;
      const shift = Math.floor((Math.random() - 0.5) * 60);
      try {
        const id = ctx.getImageData(0, y, 1920, h);
        ctx.putImageData(id, shift, y);
      } catch(e) {}
    }
  }

  requestAnimationFrame(drawStatic);
}
drawStatic();

// Trigger glitch occasionally
setInterval(() => {
  if (Math.random() < 0.3) glitchFrames = Math.floor(Math.random() * 8) + 3;
}, 2000);

// Status messages cycle
const statuses = [
  '信号を探索中',
  '受信チャンネル 切り替え中',
  'ノイズ除去 試行中',
  '発信源 再スキャン中',
  '接続経路 再構築中',
  '断片データ 解析中',
  '周波数 調整中',
  '応答なし ── 再試行',
];
let si = 0;
const statusEl = document.getElementById('status');
function cycleStatus() {
  statusEl.style.opacity = 0;
  setTimeout(() => {
    statusEl.textContent = statuses[si % statuses.length];
    statusEl.style.transition = 'opacity 0.6s';
    statusEl.style.opacity = 1;
    si++;
  }, 400);
}
cycleStatus();
setInterval(cycleStatus, 3500);

// Signal meter bars
const meterEl = document.getElementById('meter-bars');
const pctEl = document.getElementById('signal-pct');
const barHeights = [4, 6, 10, 14, 18, 14, 10, 6, 4];
barHeights.forEach((h, i) => {
  const bar = document.createElement('div');
  bar.className = 'meter-bar';
  bar.style.height = h + 'px';
  const dur = (0.4 + Math.random() * 0.6).toFixed(2);
  const delay = (i * 0.06).toFixed(2);
  bar.style.animation = `barP ${dur}s ease-in-out ${delay}s infinite alternate`;
  meterEl.appendChild(bar);
});

const styleEl = document.createElement('style');
styleEl.textContent = `@keyframes barP{from{opacity:0.15;background:rgba(0,221,170,0.3)}to{opacity:0.7;background:rgba(0,221,170,0.7)}}`;
document.head.appendChild(styleEl);

// Signal % fluctuation
let sigPct = 8 + Math.random() * 15;
setInterval(() => {
  sigPct += (Math.random() - 0.5) * 8;
  sigPct = Math.max(0, Math.min(35, sigPct));
  pctEl.textContent = Math.floor(sigPct) + '%';
}, 500);
</script>
</body>
</html>
