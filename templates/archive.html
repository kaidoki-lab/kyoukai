  <link rel="stylesheet" href="/static/space.css" />

<body class="archive-room-body">
  <main class="archive-room" data-archive-clicks="0">
    <figure class="archive-frame" aria-label="KYOUKAI 残留域">
      <img class="archive-room-image" src="/static/kyoukai_archive_room.png" alt="白い隔離室とカルテラック" />

      <button class="archive-rack-hit" type="button" data-rack aria-label="カルテラック"></button>

      <section class="archive-card" data-card aria-hidden="true">

          <span data-card-label>ARCHIVE-000</span>

          <em data-card-state>記録状態：残留</em>
        </div>
        <div class="archive-card-body" data-card-body></div>
        <a class="archive-card-link" data-card-link href="#external-signal" target="_blank" rel="nofollow sponsored noopener">残っていたリンクを開く</a>
      </section>

      <div class="archive-room-status" aria-hidden="true">
        <span>RESIDUAL STORAGE</span>
        <span>NO INDEX</span>
        <span data-click-count>000</span>
      </div>
    </figure>
    <a class="archive-return" href="/" aria-label="入口へ戻る">000 / return</a>
  </main>

      {

        label: "ARCHIVE-015",
        title: "分類不明",
        note: "西新宿高層",
        src: "/static/archive/ukiyoe-015.png",
      },
      {
        type: "affiliate",
        id: "affiliate-001",
        label: "ARCHIVE-PR-001",
        title: "混入記録",
        note: "外部接続あり",
        image: "",
        url: "https://px.a8.net/svt/ejp?a8mat=4B3R2X+4S2ALU+5GDG+NV9N7",
      },
    ];

    const room = document.querySelector(".archive-room");
    const rack = document.querySelector("[data-rack]");
    const card = document.querySelector("[data-card]");
    const cardLabel = document.querySelector("[data-card-label]");
    const cardTitle = document.querySelector("[data-card-title]");
    const cardState = document.querySelector("[data-card-state]");
    const cardBody = document.querySelector("[data-card-body]");
    const cardLink = document.querySelector("[data-card-link]");
    const clickCount = document.querySelector("[data-click-count]");

    let clicks = 0;
    let affiliateCooldown = 10;

    function chooseArchiveItem() {
      const imageItems = archiveItems.filter((item) => item.type === "image");
      const affiliateItems = archiveItems.filter((item) => item.type === "affiliate");
      const canShowAffiliate = affiliateCooldown >= 10 && Math.random() < 0.07;
      if (canShowAffiliate && affiliateItems.length) {
        affiliateCooldown = 0;
        return affiliateItems[Math.floor(Math.random() * affiliateItems.length)];
      }
      affiliateCooldown += 1;
      return imageItems[Math.floor(Math.random() * imageItems.length)];
    }

    function renderArchiveItem(item) {
      card.classList.remove("is-affiliate");
      card.setAttribute("aria-hidden", "false");
      cardLabel.textContent = item.label;
      cardTitle.textContent = item.title;
      cardState.textContent = item.type === "affiliate" ? "記録状態：混入" : "記録状態：残留";
      cardBody.replaceChildren();
      cardLink.style.display = "none";

      if (item.type === "affiliate") {
        card.classList.add("is-affiliate");
        const plate = document.createElement("div");
        plate.className = "archive-residue-plate";
        plate.textContent = item.note;
        cardBody.append(plate);
        cardLink.href = item.url;
        cardLink.style.display = "";
        return;
      }

      if (item.src) {
        const image = document.createElement("img");
        image.src = item.src;
        image.alt = item.title;
        cardBody.append(image);
      } else {
        const placeholder = document.createElement("div");
        placeholder.className = "archive-residue-plate";
        placeholder.textContent = item.note;
        cardBody.append(placeholder);
      }
    }

    rack.addEventListener("click", () => {
      clicks += 1;
      room.dataset.archiveClicks = String(clicks);
      clickCount.textContent = String(clicks).padStart(3, "0");
      renderArchiveItem(chooseArchiveItem());
    });
  </script>
</body>
</html>
