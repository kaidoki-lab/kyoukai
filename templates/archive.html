<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>記録室 / KYOUKAI</title>
  <link rel="stylesheet" href="/static/space.css" />
  <style>
    .room-title { margin: 0 0 8px; font-size: 18px; font-weight: 400; letter-spacing: 0.16em; color: #c8c1a1; }
    .room-desc, #status { color: var(--sp-muted); font-family: var(--sp-mono); font-size: 11px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px 24px; margin: 28px 0; padding: 14px; border: 1px dotted #26352d; background: rgba(8, 10, 7, 0.78); }
    .item { font-family: var(--sp-mono); font-size: 11px; }
    .key { color: #58614f; }
    .val { color: #b7c2a0; }
  </style>
</head>
<body>
  <div class="sp-scanline" aria-hidden="true"></div>
  <main class="sp-container sp-fadein">
    <span class="sp-eyebrow">KYOUKAI / 記録室</span>
    <h1 class="room-title">記録室</h1>
    <p class="room-desc">残っているものだけを並べています。欠けた部分は欠けたままです。</p>
    <div class="grid" id="genome-grid"><span id="status">読み込み中</span></div>
    <aside class="ky-signal" data-signal-box>
      <div class="ky-signal-head">境界外リンク</div>
      <div class="ky-signal-body" data-signal-copy>記録棚の下に未確認接続があります。</div>
    </aside>
    <a href="/" class="sp-back">入口へ戻る</a>
  </main>
  <script>
    fetch("/api/genome")
      .then((response) => response.json())
      .then((data) => {
        const fields = ["phase", "mutation_count", "last_mutation_type", "dominant_trait", "stability", "noise_level", "instability", "observer_count", "updated_at"];
        document.getElementById("genome-grid").innerHTML = fields
          .map((key) => `<div class="item"><span class="key">${key}: </span><span class="val">${data[key] ?? ""}</span></div>`)
          .join("");
        document.querySelector("[data-signal-box]").dataset.phase = String(data.phase);
        document.querySelector("[data-signal-copy]").textContent =
          data.mutation_count > 0 ? "観測支援物資: 変質履歴に反応 / 広告コード未挿入" : "観測支援物資: まだ封がされています / 広告コード未挿入";
      })
      .catch(() => {
        document.getElementById("status").textContent = "記録取得失敗";
      });
  </script>
</body>
</html>
