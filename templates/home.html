  <script>
    (function () {
      const hour = new Date().getHours();

      if (hour >= 2 && hour < 4) {
        document.body.classList.add("midnight");
      }

      fetch("/api/genome")
        .then((response) => response.json())
        .then((data) => {
          const phase = Math.max(0, Math.min(3, Number(data.phase || 0)));
          document.body.dataset.phase = String(phase);
          if (Number(data.mutation_count || 0) > 0) {
            document.body.classList.add("mutated-altar");
          }
        })
        .catch(() => {});
    })();
  </script>
