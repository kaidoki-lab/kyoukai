<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KYOUKAI</title>
  <link rel="stylesheet" href="/static/space.css" />
  <link rel="stylesheet" href="/static/kyoukai-guide.css" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1522978966321203" crossorigin="anonymous"></script>
  <script defer src="/static/analytics.js"></script>
  <script defer src="/static/kyoukai-guide.js"></script>
  <link rel="stylesheet" href="/static/monetize-core.css" />
  <script defer src="/static/monetize-links.js"></script>
  <script defer src="/static/monetize-core.js"></script>
</head>
<body class="altar-page">
  <div class="sp-scanline" aria-hidden="true"></div>
  <div class="altar-noise" aria-hidden="true"></div>

  <main class="altar-shell">
    <section class="altar-frame" aria-label="KYOUKAI">
      <img class="altar-image" src="/static/kyoukai_altar_v2.png" alt="" />

      <a class="hotspot hotspot-observation" href="/observation" aria-label="fragment-001"><span aria-hidden="true"></span></a>
      <a class="hotspot hotspot-archive" href="/archive" aria-label="fragment-002"><span aria-hidden="true"></span></a>
      <a class="hotspot hotspot-hyougi" href="/hyougi" aria-label="評議"><span aria-hidden="true"></span></a>
      <a class="hotspot hotspot-signal-alt" href="/signal" aria-label="fragment-004"><span aria-hidden="true"></span></a>
      <a class="hotspot hotspot-exit" href="/exit" aria-label="fragment-005"><span aria-hidden="true"></span></a>
      <a class="hotspot hotspot-null" href="/null" aria-label="fragment-006"><span aria-hidden="true"></span></a>
      <a class="hotspot hotspot-girl-film" href="/signal" aria-label="fragment-007"><span aria-hidden="true"></span></a>
      <a class="hotspot hotspot-ofuse" href="https://ofuse.me/be78f6ed" rel="noopener noreferrer" aria-label="おふせ"><span aria-hidden="true"></span></a>
      <a class="ky-monetize-route ky-monetize-route--home" href="/outside" aria-label="外部接続">
        <span class="ky-monetize-route__label">OUTSIDE</span>
        <span class="ky-monetize-route__sub">OFFERING</span>
      </a>
      <div
        class="external-artifact-mount external-artifact-mount--altar"
        data-affiliate-artifact="amazon"
        data-affiliate-slot="altar"
        data-affiliate-variant="altar"
        data-affiliate-note="外部接続"
        data-affiliate-label="漂着物"
        hidden
      ></div>
    </section>
  </main>

  <p class="affiliate-disclosure-site" data-affiliate-disclosure hidden>
    Amazonのアソシエイトとして、KYOUKAIは適格販売により収入を得ています。
  </p>

  <script>window.KYOUKAI_ROOM = 'home';</script>
  <script src="/static/bgm.js"></script>
  <script src="/static/affiliate-links.js"></script>
  <script src="/static/affiliate-artifact.js"></script>

  <script>
    (function () {
      const hour = new Date().getHours();

      if (hour >= 2 && hour < 4) {
        document.body.classList.add("midnight");
      }

      fetch("/api/genome")
        .then((response) => response.json())
        .then((data) => {
          const phase = Math.max(0, Math.min(3, Number(data.phase || 0)));
          document.body.dataset.phase = String(phase);
          if (Number(data.mutation_count || 0) > 0) {
            document.body.classList.add("mutated-altar");
          }
        })
        .catch(() => {});
    })();
  </script>
</body>
</html>
