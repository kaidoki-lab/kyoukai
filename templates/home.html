<body class="altar-page" data-outside-hotspots="off">
  <div class="sp-scanline" aria-hidden="true"></div>
  <div class="altar-noise" aria-hidden="true"></div>

  <main class="altar-shell">

    <section class="altar-frame" aria-label="KYOUKAI">
      <div class="altar-image-stack" aria-hidden="true">
        <img class="altar-image altar-image--cycle altar-image--cycle-1" src="/static/kyoukai_home_20260618_neon.png" alt="" />

        <img class="altar-image altar-image--mobile altar-image--mobile-blue" src="/static/kyoukai_altar_mobile_blue.png" alt="" />
        <img class="altar-image altar-image--mobile altar-image--mobile-red" src="/static/kyoukai_altar_mobile_red.png" alt="" />
      </div>
      <div class="altar-electric-layer" data-altar-electric aria-hidden="true"></div>

      <a class="hotspot hotspot-city" href="/city" aria-label="町へ入る"><span aria-hidden="true"></span></a>
    </section>

  <script defer src="/static/kyoukai-divine.js"></script>

  <script>
    (function () {
      const hour = new Date().getHours();

      if (hour >= 2 && hour < 4) {
        document.body.classList.add("midnight");
      }

      fetch("/api/genome")
        .then((response) => response.json())
        .then((data) => {
          const phase = Math.max(0, Math.min(3, Number(data.phase || 0)));
          document.body.dataset.phase = String(phase);
          if (Number(data.mutation_count || 0) > 0) {
            document.body.classList.add("mutated-altar");
          }
        })
        .catch(() => {});
    })();
  </script>
</body>
