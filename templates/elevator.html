<body class="kyoukai-elevator-page">
  <main class="kyoukai-elevator-room" aria-label="KYOUKAI elevator" data-elevator-room>
    <section class="elevator-cabin" aria-label="Floor selector" data-floor-index="0">
      <div class="elevator-door" aria-hidden="true" data-door-sequence>
        <img class="elevator-door-frame is-active" src="/static/kyoukai_elevator_door_4_20260627.png" alt="" data-door-frame="4" />
        <img class="elevator-door-frame" src="/static/kyoukai_elevator_door_3_20260627.png" alt="" data-door-frame="3" />
        <img class="elevator-door-frame" src="/static/kyoukai_elevator_door_2_20260627.png" alt="" data-door-frame="2" />
        <img class="elevator-door-frame" src="/static/kyoukai_elevator_door_1_20260627.png" alt="" data-door-frame="1" />
      </div>
      <div class="elevator-interior" aria-label="KYOUKAI elevator floor selector">
        <img
          class="elevator-interior-image"
          src="/static/kyoukai_elevator_interior_20260627.png"
          alt="KYOUKAI elevator interior"
          width="1024"
          height="1536"
        />
        <button class="elevator-floor-display" type="button" data-floor-enter aria-label="Enter selected floor">
          <span data-floor-number>01</span>
        </button>
        <button class="elevator-control elevator-control--up" type="button" data-floor-up aria-label="Floor up"></button>
        <button class="elevator-control elevator-control--down" type="button" data-floor-down aria-label="Floor down"></button>
      </div>
    </section>
  </main>
  <script>window.KYOUKAI_ROOM = 'elevator';</script>
