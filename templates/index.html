<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>観測域 / KYOUKAI</title>
    <meta property="og:title" content="観測域 / KYOUKAI" />
    <meta property="og:description" content="生き物を観測することができます。何かを見つめてください。" />
    <meta property="og:image" content="https://www.void-kyoukai.net/static/kyoukai_observation_room_desktop_20260618.png" />
    <meta property="og:url" content="https://www.void-kyoukai.net/observation" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="stylesheet" href="/static/style.css?v=6" />
    <link rel="stylesheet" href="/static/kyoukai-guide.css?v=3" />
    <link rel="stylesheet" href="/static/kyoukai-scenario-ui.css?v=routea2" />
    <script src="/static/kyoukai-transition.js"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1522978966321203" crossorigin="anonymous"></script>
    <script defer src="/static/analytics.js"></script>
  <script defer src="/static/kyoukai-divine.js"></script>
    <script defer src="/static/kyoukai-guide-intro.js?v=1"></script>
    <script defer src="/static/kyoukai-guide.js?v=2"></script>
    <script defer src="/static/null-infection.js"></script>
  </head>
  <body>
    <main class="facility observation-room" id="facility">
      <picture>
        <source media="(min-width: 901px)" srcset="/static/kyoukai_observation_room_desktop_20260618.png" />
        <img class="room-bg-layer" src="/static/kyoukai_observation_room_20260602.png" alt="KYOUKAI observation room" />
      </picture>
      <div class="room-crt-noise" aria-hidden="true"></div>

      <section class="left-terminal" aria-label="Observation command">
        <form id="actionForm" class="input-row terminal-command">
          <select id="actionInput" name="action" aria-label="Command">
            <option value="">COMMAND</option>
            <option value="みつめる">見つめる</option>
            <option value="よぶ">呼ぶ</option>
            <option value="なでる">撫でる</option>
          </select>
          <button type="submit">SEND</button>
        </form>
      </section>

      <section class="crt-stage" aria-label="Observation window" data-scenario-target="observation-primary">
        <div class="crt-glass" aria-hidden="true"></div>
        <div class="creature-stage">
          <div class="halo" aria-hidden="true"></div>
          <svg id="creature" class="creature" viewBox="0 0 260 260" role="img" aria-label="KYOUKAI genome organism">
            <defs>
              <radialGradient id="coreGradient" cx="48%" cy="40%" r="62%">
                <stop offset="0%" stop-color="#effff9" />
                <stop offset="45%" stop-color="#80ead4" />
                <stop offset="100%" stop-color="#263a59" />
              </radialGradient>
              <filter id="softNoise">
                <feTurbulence id="turbulence" type="fractalNoise" baseFrequency="0.014" numOctaves="2" result="noise" />
                <feDisplacementMap id="displace" in="SourceGraphic" in2="noise" scale="3" />
              </filter>
            </defs>
            <g id="creatureOrgans" class="creature-organs" aria-hidden="true">
              <path id="organLeft" class="organ organ-left" d="M76 127 C42 110 39 78 64 54 C83 77 90 99 87 122 Z" />
              <path id="organRight" class="organ organ-right" d="M184 127 C218 110 221 78 196 54 C177 77 170 99 173 122 Z" />
              <path id="organCrown" class="organ organ-crown" d="M101 67 C115 31 145 31 159 67 C140 56 120 56 101 67 Z" />
              <path id="organTail" class="organ organ-tail" d="M130 211 C151 240 124 259 104 232 C118 231 128 222 130 211 Z" />
              <circle id="organOrbA" class="organ organ-orb organ-orb-a" cx="68" cy="176" r="9" />
              <circle id="organOrbB" class="organ organ-orb organ-orb-b" cx="193" cy="178" r="7" />
              <circle id="organOrbC" class="organ organ-orb organ-orb-c" cx="105" cy="50" r="6" />
              <circle id="organOrbD" class="organ organ-orb organ-orb-d" cx="156" cy="50" r="6" />
            </g>
            <path id="bodyShape" class="membrane" d="M130 39 C177 39 213 76 213 127 C213 183 178 223 130 223 C82 223 47 183 47 127 C47 76 83 39 130 39 Z" />
            <circle class="core-ring" cx="130" cy="130" r="43" />
            <circle id="core" class="core" cx="130" cy="130" r="24" />
            <g id="faceMirage" class="face-mirage" aria-hidden="true">
              <circle class="face-dot face-dot-left" cx="106" cy="118" r="5" />
              <circle class="face-dot face-dot-right" cx="154" cy="118" r="5" />
              <path class="face-curve" d="M105 159 C121 147 140 147 156 159" />
            </g>
          </svg>
          <div class="creature-id-readout" aria-hidden="true">
            <strong id="creatureName">Unknown Organism</strong>
            <span id="creatureSpecies">U-00000000</span>
            <span class="visit-count">obs. <span id="totalVisits">0</span></span>
          </div>
        </div>
      </section>

      <a class="observation-signal-residue" href="/signal" aria-label="微弱な受信信号を追跡">
        <span aria-hidden="true">RX-09</span>
      </a>
    </main>

    <script src="/static/app.js"></script>
    <script>window.KYOUKAI_ROOM = 'observation';</script>
    <script defer src="/static/kyoukai-route-a-room.js?v=routea2"></script>
    <script src="/static/bgm.js"></script>
  </body>
</html>
