<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Observer Room / KYOUKAI</title>
  <meta property="og:title" content="Observer Room / KYOUKAI" />
  <meta property="og:description" content="観測者の部屋。何かが記録されています。" />
  <meta property="og:image" content="https://www.void-kyoukai.net/static/kyoukai_observation_room.png" />
  <meta property="og:url" content="https://www.void-kyoukai.net/observer" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="stylesheet" href="/static/observer.css?v=4">
  <script src="/static/kyoukai-transition.js"></script>
  <script defer src="/static/analytics.js"></script>
</head>
<body>
  <main class="observer-room" data-genome="piko" aria-label="observer room">
    <div class="observer-bg observer-bg-morning" aria-hidden="true"></div>
    <div class="observer-bg observer-bg-night" aria-hidden="true"></div>

    <div class="room-backdrop" aria-hidden="true">
      <div class="wall-shelf"></div>
      <div class="window-glow"></div>
      <div class="floor-rug"></div>
      <div class="tiny-stars star-a"></div>
      <div class="tiny-stars star-b"></div>
      <div class="tiny-stars star-c"></div>
    </div>

    <a id="outsideBox" class="outside-box" href="/outside" aria-label="outside box"></a>
    <a id="maGate" class="ma-gate" href="/ma" aria-hidden="true" tabindex="-1"></a>

    <button class="room-hotspot hotspot-chair" type="button" data-room-hotspot="chair" aria-label="chair"></button>
    <button class="room-hotspot hotspot-table" type="button" data-room-hotspot="table" aria-label="small table"></button>
    <button class="room-hotspot hotspot-left-cushion" type="button" data-room-hotspot="left-cushion" aria-label="left cushion"></button>
    <button class="room-hotspot hotspot-right-cushion" type="button" data-room-hotspot="right-cushion" aria-label="right cushion"></button>

    <section id="mascot" class="mascot phase-1 look-front" aria-label="magical girl mascot">
      <div id="speechBubble" class="speech-bubble hidden">&#12415;&#12390;&#12427;&#65311;</div>
      <div class="magic-shadow"></div>
      <div class="pixel-girl use-sheet">
        <img id="mascotSprite" class="sprite-girl" src="/static/observer/assets/sprites/piko_trimmed/idle_1.png" alt="">
        <div class="hair back-hair"></div>
        <div class="hair side-hair left"></div>
        <div class="hair side-hair right"></div>
        <div class="head">
          <div class="eye eye-left"><span></span></div>
          <div class="eye eye-right"><span></span></div>
          <div class="cheek cheek-left"></div>
          <div class="cheek cheek-right"></div>
          <div class="mouth"></div>
        </div>
        <div class="hat">
          <div class="hat-tip"></div>
          <div class="hat-brim"></div>
          <div class="hat-star"></div>
        </div>
        <div class="body">
          <div class="collar"></div>
          <div class="dress"></div>
          <div class="arm arm-left"></div>
          <div class="arm arm-right"></div>
          <div class="wand"></div>
        </div>
        <div class="leg leg-left"></div>
        <div class="leg leg-right"></div>
      </div>
    </section>
  </main>

  <script>window.KYOUKAI_ROOM = 'observer';</script>
  <script src="/static/observer.js?v=3"></script>
  <script src="/static/observer-bgm.js?v=1"></script>
  <script>
    (function () {
      var threshold = 18000;
      var shown = false;

      setTimeout(function () {
        if (shown) return;
        shown = true;

        var link = document.createElement('a');
        link.href = '/particles';
        link.style.cssText = [
          'position:fixed',
          'bottom:18px',
          'right:18px',
          'width:8px',
          'height:8px',
          'border-radius:50%',
          'background:rgba(255,220,30,0.55)',
          'display:block',
          'text-decoration:none',
          'cursor:pointer',
          'z-index:50',
          'animation:pobs-pulse 2.4s ease-in-out infinite',
        ].join(';');
        link.setAttribute('aria-hidden', 'true');

        var style = document.createElement('style');
        style.textContent = '@keyframes pobs-pulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.9;transform:scale(1.5)}}';
        document.head.appendChild(style);
        document.body.appendChild(link);
      }, threshold);
    })();
  </script>
</body>
</html>
