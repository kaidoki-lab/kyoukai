<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SIGNAL / KYOUKAI</title>
  <link rel="stylesheet" href="/static/space.css" />
  <link rel="stylesheet" href="/static/kyoukai-guide.css?v=2" />
  <link rel="stylesheet" href="/static/outside-hotspots.css?v=3" />
  <link rel="stylesheet" href="/static/drift-flags.css" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1522978966321203" crossorigin="anonymous"></script>
  <script defer src="/static/analytics.js"></script>
  <script defer src="/static/kyoukai-guide-intro.js?v=1"></script>
    <script defer src="/static/kyoukai-guide.js?v=2"></script>
  <script defer src="/static/null-infection.js"></script>
  <script defer src="/static/drift-flags.js"></script>
  <link rel="stylesheet" href="/static/monetize-core.css" />
  <script defer src="/static/monetize-links.js"></script>
  <script defer src="/static/monetize-core.js"></script>
</head>
<body class="signal-room-body">
  <script>window.KYOUKAI_ROOM = 'signal';</script>
  <main class="signal-room" data-audio="locked">
    <figure class="signal-chapel-frame" aria-label="KYOUKAI signal room">
      <picture>
        <source media="(max-width: 768px)" srcset="/static/signal-room-twomi-mobile.png" />
        <img class="signal-chapel-image" src="/static/signal-room-twomi-desktop.png" alt="Signal room background" />
      </picture>

      <section class="signal-tv-screen" aria-label="Video receiver">
        <video
          id="signalVideo"
          class="signal-media"
          autoplay
          muted
          playsinline
          preload="metadata"
          aria-label="Signal video"
        ></video>
        <button class="signal-audio-hit" type="button" aria-label="Enable signal audio"></button>
      </section>
      <button class="signal-channel-hit" type="button" aria-label="Change channel"></button>
      <a
        id="twomiSignalHotspot"
        class="signal-twomi-hotspot"
        href="/external-signal"
        aria-label="広告：外部通信を開始"
      >
        <span class="visually-hidden">広告：外部通信を開始</span>
      </a>
      <img
        class="signal-twomi-tracker"
        border="0"
        width="1"
        height="1"
        src="https://www15.a8.net/0.gif?a8mat=4B5TCD+32QNAQ+5VDQ+BX3J6"
        alt=""
      />
    </figure>

    <a class="signal-return" href="/" aria-label="Return to entrance">000 / return</a>
  </main>


  <script>
    const room = document.querySelector(".signal-room");
    const signalVideo = document.getElementById("signalVideo");
    const audioHit = document.querySelector(".signal-audio-hit");
    const channelHit = document.querySelector(".signal-channel-hit");
    const twomiHotspot = document.getElementById("twomiSignalHotspot");
    let videoSources = [];
    let lastVideoSource = "";

    if ("speechSynthesis" in window) {
      window.speechSynthesis.cancel();
    }

    function pick(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function pickVideoSource() {
      if (videoSources.length < 2) return videoSources[0];
      let next = pick(videoSources);
      if (next === lastVideoSource) {
        next = pick(videoSources.filter((source) => source !== lastVideoSource));
      }
      return next;
    }

    async function playSignalVideo(forceNext = false) {
      if (!signalVideo || !videoSources.length) {
        signalVideo?.classList.remove("is-visible");
        return;
      }

      let source = signalVideo.dataset.source || "";
      if (!source || forceNext) {
        source = pickVideoSource();
        signalVideo.dataset.source = source;
        signalVideo.src = source;
        lastVideoSource = source;
      }

      signalVideo.controls = false;
      signalVideo.loop = false;
      signalVideo.playsInline = true;
      signalVideo.classList.add("is-visible");

      try {
        await signalVideo.play();
      } catch (_) {
        signalVideo.classList.remove("is-visible");
      }
    }

    async function unlockAudio() {
      if (!signalVideo) return;
      signalVideo.muted = false;
      signalVideo.volume = 0.82;
      room.dataset.audio = "unlocked";
      try {
        await signalVideo.play();
      } catch (_) {
        signalVideo.muted = true;
        room.dataset.audio = "locked";
      }
    }

    async function loadLocalVideos() {
      try {
        const response = await fetch("/api/videos", { cache: "no-store" });
        if (!response.ok) return;
        const data = await response.json();
        videoSources = Array.isArray(data.videos) ? data.videos : [];
        await playSignalVideo(true);
      } catch (_) {
        videoSources = [];
      }
    }

    signalVideo?.addEventListener("ended", () => playSignalVideo(true));
    signalVideo?.addEventListener("error", () => {
      signalVideo.classList.remove("is-visible");
      signalVideo.dataset.source = "";
      playSignalVideo(true);
    });
    audioHit?.addEventListener("click", unlockAudio);
    channelHit?.addEventListener("click", () => playSignalVideo(true));
    twomiHotspot?.addEventListener("click", () => {
      if (typeof window.trackKyoukaiEvent === "function") {
        window.trackKyoukaiEvent("external_signal_entry", { source_page: "/signal" });
        window.trackKyoukaiEvent("affiliate_click", { source_page: "/signal", link_type: "affiliate" });
      } else if (typeof window.gtag === "function") {
        window.gtag("event", "external_signal_entry", { source_page: "/signal" });
      }
    });
    window.addEventListener("pagehide", () => {
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
    });
    document.addEventListener("visibilitychange", () => {
      if (document.hidden && "speechSynthesis" in window) window.speechSynthesis.cancel();
    });

    loadLocalVideos();
  </script>
  <script src="/static/outside-items.js"></script>
  <script src="/static/outside-hotspots.js?v=3"></script>
</body>
</html>
