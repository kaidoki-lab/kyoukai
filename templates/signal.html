<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>受信域 / KYOUKAI</title>
  <link rel="stylesheet" href="/static/space.css" />
</head>
<body class="signal-room-body">
  <main class="signal-room" data-mode="scan">
    <figure class="signal-chapel-frame" aria-label="KYOUKAI 受信域">
      <img class="signal-chapel-image" src="/static/kyoukai_signal_room.png" alt="教会内の古い受信機" />

      <section class="signal-tv-screen" aria-label="テレビ受信画面">
        <div class="signal-tv-video" data-video-stage>
          <div class="signal-static" aria-hidden="true"></div>
          <div class="signal-waveform" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <div class="signal-broadcast-text" data-broadcast-text>RECEIVING...</div>
        </div>
      </section>

      <button class="signal-radio-touch" type="button" data-radio-start aria-label="ラジオ受信を開始"></button>
      <aside class="signal-radio-display" aria-hidden="true">
        <span data-frequency>83.04MHz</span>
        <b>VOICE RX</b>
      </aside>
      <span class="signal-radio-line" data-radio-line aria-live="polite"></span>

      <aside class="signal-floating-log" aria-label="受信ログ">
        <span>SIGNAL LOST</span>
        <span>UNKNOWN SOURCE</span>
        <span>RECEIVING...</span>
        <span>DRIFT DETECTED</span>
        <span>ARCHIVE FAILED</span>
      </aside>

      <div class="signal-emergency" data-emergency aria-hidden="true">受信しました</div>
    </figure>

    <a class="signal-return" href="/" aria-label="入口へ戻る">000 / return</a>
  </main>

  <script>
    const room = document.querySelector(".signal-room");
    const broadcastText = document.querySelector("[data-broadcast-text]");
    const radioLine = document.querySelector("[data-radio-line]");
    const frequency = document.querySelector("[data-frequency]");
    const emergency = document.querySelector("[data-emergency]");
    const videoStage = document.querySelector("[data-video-stage]");
    const radioStart = document.querySelector("[data-radio-start]");

    const radioFallbackLines = [
      "現在、受信域八十三番に接続しています。意味のない言葉が、夜を満たしていきます。",
      "こちらは境界外放送です。午前三時から未明にかけて、沈黙が強まるでしょう。",
      "第六観測波、通過。存在しない町の灯りが、まだ消えていません。",
      "受信番号、零、零、七。聞こえている方は、そのまま聞いてください。",
      "この放送は終了していません。終了予定も、登録されていません。",
      "遠い窓から、白い信号が流入しています。意味は確認されていません。",
    ];

    const tvFragments = [
      "受信域へようこそ",
      "意味のない言葉が",
      "夜を満たしていく",
      "深流する放送",
      "SIGNAL CORRUPTION",
      "UNKNOWN SOURCE",
    ];

    const emergencies = [
      "受信しました",
      "信号が混線しています",
      "この放送は終了していません",
      "ARCHIVE FAILED",
      "UNKNOWN SOURCE",
    ];

    const videoSources = [
      // "/static/signal-fragment-01.mp4",
      // "https://www.youtube.com/embed/VIDEO_ID?autoplay=1&mute=1&loop=1&playlist=VIDEO_ID&controls=0",
    ];

    let radioVoiceActive = false;
    let radioTimer = null;
    let lastRadioLine = "";

    room.dataset.mode = Math.random() > 0.5 ? "television" : "radio";

    function pick(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    async function getRadioLine() {
      try {
        const response = await fetch("/api/radio-line", { cache: "no-store" });
        if (response.ok) {
          const data = await response.json();
          if (data.line) return data.line;
        }
      } catch (_) {}
      return pick(radioFallbackLines);
    }

    function setFrequency() {
      frequency.textContent = `${(76 + Math.random() * 18).toFixed(2)}MHz`;
    }

    async function speakRadioLine() {
      const line = await getRadioLine();
      lastRadioLine = line;
      radioLine.textContent = line;
      setFrequency();
      if (!("speechSynthesis" in window) || !radioVoiceActive) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(line);
      utterance.lang = "ja-JP";
      utterance.rate = 0.78;
      utterance.pitch = 0.76;
      utterance.volume = room.dataset.mode === "radio" ? 0.78 : 0.28;
      window.speechSynthesis.speak(utterance);
    }

    function startRadioVoice() {
      radioVoiceActive = true;
      radioStart.classList.add("is-active");
      speakRadioLine();
      window.clearInterval(radioTimer);
      radioTimer = window.setInterval(speakRadioLine, 9200);
    }

    function setTvFragment() {
      broadcastText.textContent = pick(tvFragments);
      videoStage.dataset.fragment = String(Math.floor(Math.random() * 9));
      tuneVideoSource();
    }

    function tuneVideoSource() {
      const existing = videoStage.querySelector("[data-signal-media]");
      if (room.dataset.mode !== "television" || !videoSources.length) {
        existing?.remove();
        return;
      }
      const source = pick(videoSources);
      const isYoutube = source.includes("youtube.com") || source.includes("youtu.be");
      if (existing?.dataset.source === source) return;
      existing?.remove();
      const media = isYoutube ? document.createElement("iframe") : document.createElement("video");
      media.className = "signal-media";
      media.dataset.signalMedia = "true";
      media.dataset.source = source;
      if (isYoutube) {
        media.src = source;
        media.allow = "autoplay; encrypted-media; picture-in-picture";
        media.referrerPolicy = "strict-origin-when-cross-origin";
      } else {
        media.src = source;
        media.autoplay = true;
        media.muted = true;
        media.loop = true;
        media.playsInline = true;
      }
      media.setAttribute("aria-hidden", "true");
      videoStage.prepend(media);
    }

    function drift() {
      const next = Math.random();
      if (next < 0.34) room.dataset.mode = "television";
      else if (next < 0.68) room.dataset.mode = "radio";
      else room.dataset.mode = "silent";
      setFrequency();
      setTvFragment();
      if (room.dataset.mode === "radio" && radioVoiceActive) speakRadioLine();
    }

    function interrupt() {
      if (Math.random() > 0.28) return;
      emergency.textContent = pick(emergencies);
      emergency.setAttribute("aria-hidden", "false");
      emergency.classList.add("is-live");
      window.setTimeout(() => {
        emergency.classList.remove("is-live");
        emergency.setAttribute("aria-hidden", "true");
      }, 1800);
    }

    radioStart.addEventListener("click", startRadioVoice);
    setFrequency();
    setTvFragment();
    getRadioLine().then((line) => {
      lastRadioLine = line;
      radioLine.textContent = line;
    });
    window.setTimeout(() => {
      if (!radioVoiceActive) startRadioVoice();
    }, 900);
    window.setInterval(drift, 9000 + Math.random() * 6000);
    window.setInterval(interrupt, 7000);
    window.setInterval(setTvFragment, 3200);

    fetch("/api/genome")
      .then((response) => response.json())
      .then((data) => {
        room.dataset.phase = String(data.phase || 0);
        if (Number(data.noise_level || 0) > 60) room.classList.add("signal-heavy-noise");
      })
      .catch(() => {
        room.dataset.phase = "unknown";
      });
  </script>
</body>
</html>
