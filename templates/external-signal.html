<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EXTERNAL BOUNDARY / KYOUKAI</title>
  <meta name="description" content="KYOUKAI境界外接続。この先にはTwomiへの広告リンクが含まれます。" />
  <link rel="stylesheet" href="/static/external-signal.css" />
  <script defer src="/static/analytics.js"></script>
  <script defer src="/static/external-signal.js"></script>
</head>
<body class="external-signal-body">
  <main
    class="signal-boundary"
    data-external-signal
    data-state="idle"
    data-affiliate-url="https://px.a8.net/svt/ejp?a8mat=4B5TCD+32QNAQ+5VDQ+BX3J6"
  >
    <div class="boundary-backdrop" aria-hidden="true"></div>

    <section class="boundary-stage" aria-label="境界外通信">
      <img
        class="boundary-image"
        src="/static/images/external-boundary.png"
        alt="無数の祭具と古いテレビに囲まれた、白い裂け目のある境界"
      />
      <div class="boundary-chroma" aria-hidden="true"></div>
      <div class="boundary-noise" aria-hidden="true"></div>
      <div class="boundary-scanlines" aria-hidden="true"></div>
      <div class="boundary-glow" aria-hidden="true"></div>
      <div class="boundary-flash" aria-hidden="true"></div>

      <button
        class="boundary-hotspot"
        type="button"
        data-boundary-hotspot
        aria-label="中央の白い裂け目に触れる"
      ></button>

      <a class="boundary-return" href="/signal">受信域へ戻る</a>

      <aside class="boundary-pr" aria-label="広告表示">
        <strong>外部接続 / PR</strong>
        <span>この先は外部サービスへの接続を含みます</span>
      </aside>

      <section
        class="boundary-command"
        data-boundary-command
        role="dialog"
        aria-modal="false"
        aria-labelledby="boundaryCommandText"
        hidden
      >
        <p id="boundaryCommandText" class="boundary-command__text" data-command-text>
          追いかけますか？
        </p>
        <div class="boundary-command__options">
          <a
            class="boundary-command__option"
            href="https://px.a8.net/svt/ejp?a8mat=4B5TCD+32QNAQ+5VDQ+BX3J6"
            rel="nofollow sponsored noopener"
            data-follow-boundary
          >
            <span aria-hidden="true">▶</span> 追いかける
          </a>
          <button class="boundary-command__option" type="button" data-cancel-boundary>
            <span aria-hidden="true">　</span> 追いかけない
          </button>
        </div>
        <p class="boundary-command__notice">境界外接続にはPRが含まれます</p>
      </section>

      <p class="boundary-status" data-boundary-status aria-live="polite"></p>

      <img
        class="boundary-tracker"
        border="0"
        width="1"
        height="1"
        src="https://www15.a8.net/0.gif?a8mat=4B5TCD+32QNAQ+5VDQ+BX3J6"
        alt=""
      />
    </section>
  </main>
</body>
</html>
