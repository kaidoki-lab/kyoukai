<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>境界域 / exit / KYOUKAI</title>
  <link rel="stylesheet" href="/static/exit.css" />
  <link rel="stylesheet" href="/static/kyoukai-guide.css" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1522978966321203" crossorigin="anonymous"></script>
  <script defer src="/static/analytics.js"></script>
  <script defer src="/static/kyoukai-guide.js"></script>
  <script defer src="/static/exit.js"></script>
  <script defer src="/static/bgm.js"></script>
</head>
<body class="exit-boundary-body">
  <main class="exit-boundary" aria-label="境界域">
    <section class="exit-stage" aria-label="接続中の出口">
      <img class="exit-scene" alt="" aria-hidden="true" />
      <div class="exit-fade" aria-hidden="true"></div>
      <div class="exit-touch-layer" aria-label="調べる場所">
        <button class="exit-hotspot" type="button" data-hotspot="a" aria-label="調べる"></button>
        <button class="exit-hotspot" type="button" data-hotspot="b" aria-label="調べる"></button>
        <button class="exit-hotspot" type="button" data-hotspot="c" aria-label="調べる"></button>
      </div>
      <a class="exit-return" href="/" aria-label="入口へ戻る">000</a>
    </section>

    <section class="exit-loader" aria-live="polite" aria-hidden="true">
      <img class="exit-loader__art" alt="" aria-hidden="true" />
      <div class="exit-loader__noise" aria-hidden="true"></div>
      <div class="exit-loader__girl" aria-hidden="true">
        <span class="exit-loader__hair"></span>
        <span class="exit-loader__head"></span>
        <span class="exit-loader__arm exit-loader__arm--one"></span>
        <span class="exit-loader__arm exit-loader__arm--two"></span>
        <span class="exit-loader__body"></span>
        <span class="exit-loader__skirt"></span>
        <span class="exit-loader__leg exit-loader__leg--one"></span>
        <span class="exit-loader__leg exit-loader__leg--two"></span>
      </div>
      <div class="exit-loader__bubble"></div>
      <div class="exit-loader__status" aria-hidden="true"></div>
      <div class="exit-loader__text">
        <span>LOADING...</span>
        <span>signal unstable...</span>
        <span>connecting...</span>
      </div>
    </section>

    <section class="exit-ending" aria-live="polite" aria-hidden="true">
      <p class="exit-ending__label">connection result</p>
      <h1 class="exit-ending__title"></h1>
      <button class="exit-ending__continue" type="button">もう一度つなぐ</button>
      <a class="exit-ending__return" href="/">入口へ戻る</a>
    </section>
  </main>
</body>
</html>
