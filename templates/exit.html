<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>脱出室 / KYOUKAI</title>
  <link rel="stylesheet" href="/static/space.css" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1522978966321203" crossorigin="anonymous"></script>
  <script defer src="/static/analytics.js"></script>
</head>
<body class="exit-realm-body">
  <main class="exit-realm" data-scene="emergency" data-attempt="0">
    <section class="exit-frame" aria-label="脱出室">
      <div class="exit-image" aria-hidden="true"></div>
      <div class="exit-vignette" aria-hidden="true"></div>

      <button class="exit-point exit-point-x" type="button" data-choice="x" aria-label="調べる"></button>
      <button class="exit-point exit-point-y" type="button" data-choice="y" aria-label="調べる"></button>
      <button class="exit-point exit-point-z" type="button" data-choice="z" aria-label="調べる"></button>

      <div class="exit-message" id="exitMessage" aria-live="polite">戻れそうな場所があります。</div>
    </section>

    <aside class="exit-side" aria-label="脱出室の記録">
      <div class="exit-side-title">soft corridor protocol</div>
      <p id="exitHint">どこかが薄く接続されています。確かな出口とは限りません。</p>
      <div class="exit-route" id="exitRoute">route: emergency</div>
      <a href="/" class="exit-return">入口へ戻る</a>
    </aside>
  </main>

  <script>
    const scenes = {
      emergency: {
        message: "出口の形だけが残っています。",
        next: { x: "hall", y: "window", z: "corner" },
      },
      hall: {
        message: "足音だけが、少し遅れて戻ってきます。",
        next: { x: "window", y: "emergency", z: "corner" },
      },
      corner: {
        message: "曲がった先に、さっき見た扉があります。",
        next: { x: "emergency", y: "hall", z: "window" },
      },
      window: {
        message: "外はあります。出口とは限りません。",
        next: { x: "emergency", y: "corner", z: "hall" },
      },
    };

    const realm = document.querySelector(".exit-realm");
    const messageNode = document.getElementById("exitMessage");
    const hintNode = document.getElementById("exitHint");
    const routeNode = document.getElementById("exitRoute");
    const params = new URLSearchParams(window.location.search);
    let scene = scenes[params.get("scene")] ? params.get("scene") : "emergency";
    let attempt = Number.parseInt(params.get("n") || "0", 10);

    function renderScene() {
      const current = scenes[scene];
      realm.dataset.scene = scene;
      realm.dataset.attempt = String(attempt);
      messageNode.textContent = attempt > 0 ? current.message : "戻れそうな場所があります。";
      routeNode.textContent = `route: ${scene} / n=${attempt}`;
      hintNode.textContent = attempt >= 6
        ? "同じ場所が何度も違う顔で戻ってきます。"
        : "どこかが薄く接続されています。確かな出口とは限りません。";
    }

    document.querySelectorAll("[data-choice]").forEach((button) => {
      button.addEventListener("click", () => {
        const current = scenes[scene];
        scene = current.next[button.dataset.choice] || "emergency";
        attempt += 1;
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set("scene", scene);
        nextUrl.searchParams.set("n", String(attempt));
        window.history.replaceState({}, "", nextUrl);
        realm.classList.remove("exit-shift");
        void realm.offsetWidth;
        realm.classList.add("exit-shift");
        renderScene();
      });
    });

    window.KYOUKAI_ROOM = 'exit';

    fetch("/api/genome")
      .then((response) => response.json())
      .then((data) => {
        realm.dataset.phase = String(data.phase || 0);
      })
      .catch(() => {});

    renderScene();
  </script>
  <script src="/static/bgm.js"></script>
</body>
</html>
