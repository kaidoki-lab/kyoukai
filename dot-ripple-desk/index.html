<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#050507">
    <title>DOT RIPPLE DESK</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <canvas id="stage" aria-label="DOT RIPPLE DESK canvas"></canvas>

    <button id="settingsToggle" class="settings-toggle" type="button" aria-label="Open settings" title="Settings (S)"></button>

    <section id="settingsPanel" class="settings-panel" aria-label="Settings" aria-hidden="true">
      <header class="panel-header">
        <h1>DOT RIPPLE DESK</h1>
        <button id="closePanel" type="button" aria-label="Close settings" title="Close"></button>
      </header>

      <div class="setting-row">
        <label for="themeSelect">Theme</label>
        <select id="themeSelect">
          <option value="classic">Classic</option>
          <option value="neon">Neon</option>
          <option value="pastel">Pastel</option>
          <option value="monochrome">Monochrome</option>
          <option value="sunset">Sunset</option>
        </select>
      </div>

      <div class="setting-row range-row">
        <label for="dotSize">Dot size <span data-value-for="dotSize"></span></label>
        <input id="dotSize" type="range" min="2" max="8" step="0.5">
      </div>

      <div class="setting-row range-row">
        <label for="dotGap">Dot spacing <span data-value-for="dotGap"></span></label>
        <input id="dotGap" type="range" min="6" max="18" step="1">
      </div>

      <div class="setting-row range-row">
        <label for="rippleSpeed">Ripple speed <span data-value-for="rippleSpeed"></span></label>
        <input id="rippleSpeed" type="range" min="0.5" max="2.2" step="0.1">
      </div>

      <div class="setting-row range-row">
        <label for="rippleStrength">Ripple strength <span data-value-for="rippleStrength"></span></label>
        <input id="rippleStrength" type="range" min="0.4" max="2" step="0.1">
      </div>

      <div class="setting-row range-row">
        <label for="autoFrequency">Auto ripple <span data-value-for="autoFrequency"></span></label>
        <input id="autoFrequency" type="range" min="0.2" max="5" step="0.1">
      </div>

      <div class="setting-row range-row">
        <label for="trailAmount">Afterimage <span data-value-for="trailAmount"></span></label>
        <input id="trailAmount" type="range" min="0" max="0.45" step="0.01">
      </div>

      <div class="setting-row range-row">
        <label for="brightness">Brightness <span data-value-for="brightness"></span></label>
        <input id="brightness" type="range" min="0.45" max="1.45" step="0.05">
      </div>

      <div class="setting-row">
        <label for="fpsLimit">FPS limit</label>
        <select id="fpsLimit">
          <option value="60">60</option>
          <option value="45">45</option>
          <option value="30">30</option>
        </select>
      </div>

      <div class="switch-row">
        <label><input id="autoRipple" type="checkbox"> Auto ripple</label>
        <label><input id="rebelDot" type="checkbox"> Strange dot</label>
      </div>

      <div class="button-row">
        <button id="resetView" type="button">Reset</button>
        <button id="saveSettings" type="button">Save</button>
      </div>
    </section>

    <script src="main.js"></script>
  </body>
</html>
